<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CHAMBA GO | Acceso</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --main-orange: #f97316; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .hero-mesh { 
            background-image: radial-gradient(at 0% 0%, rgba(249, 115, 22, 0.12) 0, transparent 50%), 
                              radial-gradient(at 100% 0%, rgba(249, 115, 22, 0.05) 0, transparent 50%);
        }
        .app-shell {
            width: 100%; max-width: 450px; margin: 0 auto;
            min-height: 100vh; display: flex; flex-direction: column;
            background: #020617; position: relative;
        }
        .glass-card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 2.5rem;
        }
        .premium-input {
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 1.2rem; padding: 1.1rem; color: white; outline: none;
            font-size: 11px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .premium-input:focus { border-color: var(--main-orange); background: rgba(255,255,255,0.06); }
        
        .btn-primary {
            width: 100%; background: var(--main-orange); color: black;
            padding: 1.2rem; border-radius: 1.2rem; font-weight: 900;
            text-transform: uppercase; display: flex; align-items: center;
            justify-content: center; gap: 10px; transition: all 0.2s;
            box-shadow: 0 10px 20px rgba(249, 115, 22, 0.15);
        }
        .btn-primary:active { transform: scale(0.95); }
        .fade-in { animation: fadeIn 0.6s ease-out forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Navigation Bar Styles */
        .tab-bar-wrapper { position: fixed; bottom: 15px; width: 100%; max-width: 450px; padding: 0 15px; z-index: 1000; left: 50%; transform: translateX(-50%); }
        .tab-bar { width: 100%; height: 75px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 25px; display: grid; grid-template-columns: repeat(5, 1fr); align-items: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .tab-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #64748b; cursor: pointer; transition: all 0.3s; width: 100%; }
        .tab-item.active { color: var(--main-orange); }
        .plus-button { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); width: 60px; height: 60px; background: var(--main-orange); border-radius: 20px; display: flex; align-items: center; justify-content: center; color: #000; font-size: 24px; border: 6px solid #020617; box-shadow: 0 10px 20px rgba(249, 115, 22, 0.3); transition: transform 0.2s; }
    </style>
</head>
<body class="h-full bg-slate-950">

    <div class="app-shell hero-mesh">
        <header class="px-6 pt-12 pb-6 flex items-center gap-4">
            <div onclick="window.location.href='index.html'" class="w-10 h-10 glass-card flex items-center justify-center cursor-pointer">
                <i class="fa-solid fa-house text-[10px] text-white"></i>
            </div>
            <h1 class="text-2xl font-black italic tracking-tighter uppercase text-white">
                INICIAR <span class="text-orange-500">SESIÓN</span>
            </h1>
        </header>

        <main class="flex-1 px-6 pt-2 overflow-y-auto pb-44">
            <div class="mb-10 text-center fade-in">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-orange-500/10 rounded-3xl mb-6 border border-orange-500/20 -rotate-3">
                    <i class="fa-solid fa-bolt-lightning text-3xl text-orange-500"></i>
                </div>
                <p class="text-slate-500 text-[9px] font-black uppercase tracking-[0.3em] italic opacity-70">
                    Bienvenido de vuelta a la red
                </p>
            </div>

            <div class="glass-card p-8 space-y-5 fade-in">
                <div class="space-y-4">
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-[10px] text-orange-500 font-black italic">+52</span>
                        <input type="tel" id="loginPhone" class="premium-input pl-12" placeholder="WHATSAPP">
                    </div>
                    <input type="password" id="loginPass" class="premium-input" placeholder="CONTRASEÑA">
                </div>
                
                <button onclick="handleLogin()" id="loginBtn" class="btn-primary text-[11px] mt-6">
                    <span id="btnText">Entrar Ahora</span>
                    <i class="fa-solid fa-arrow-right-long text-sm"></i>
                </button>

                <div class="pt-8 text-center border-t border-white/5">
                    <a href="registro-cliente.html" class="text-[9px] font-black text-slate-500 uppercase tracking-widest underline decoration-orange-500/30 underline-offset-8">Regístrate como Cliente</a>
                </div>
            </div>
        </main>

        <div class="tab-bar-wrapper">
            <nav class="tab-bar">
                <div class="tab-item" onclick="location.href='index.html'">
                    <i class="fa-solid fa-house text-xl"></i>
                    <span class="text-[8px] font-black uppercase italic mt-1">Inicio</span>
                </div>
                
                <div class="tab-item" onclick="location.href='categorias.html'">
                    <i class="fa-solid fa-compass text-xl"></i>
                    <span class="text-[8px] font-black italic uppercase mt-1">Explorar</span>
                </div>

                <div class="relative flex justify-center items-center">
                    <div onclick="location.href='login.html'" class="plus-button">
                        <i class="fa-solid fa-plus text-black"></i>
                    </div>
                </div>

                <div class="tab-item" onclick="location.href='login.html'">
                    <i class="fa-solid fa-comment text-xl"></i>
                    <span class="text-[8px] font-black uppercase italic mt-1">Chat</span>
                </div>

                <div class="tab-item active" onclick="location.href='login.html'">
                    <i class="fa-solid fa-user text-xl"></i>
                    <span class="text-[8px] font-black uppercase italic mt-1">Perfil</span>
                </div>
            </nav>
        </div>
    </div> 

    <script>
        const SUPABASE_URL = 'https://thjzjwyosyxsgjfcignp.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ugM18BI_W0G-pu-mY-0a7g_omiUa7rT';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function handleLogin() {
            let phoneVal = document.getElementById('loginPhone').value.trim();
            const passVal = document.getElementById('loginPass').value.trim();
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');

            if(!phoneVal || !passVal) return alert("Completa los datos");

            phoneVal = phoneVal.replace(/\D/g, '').slice(-10);

            btn.disabled = true;
            btnText.innerText = "CONECTANDO...";

            try {
                const { data: user, error } = await _supabase
                    .from('users')
                    .select('*')
                    .eq('phone', phoneVal)
                    .eq('password', passVal)
                    .maybeSingle();

                if (error) throw error;

                if (!user) {
                    alert("⚠️ Número o contraseña incorrectos.");
                    btn.disabled = false;
                    btnText.innerText = "Entrar Ahora";
                    return;
                }

                localStorage.setItem('userPhone', phoneVal);
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userName', user.name || 'Usuario');
                localStorage.setItem('userRole', user.role || 'cliente');

                window.location.href = 'perfil.html';

            } catch (err) {
                console.error("Error detallado:", err);
                alert("Error de conexión");
                btn.disabled = false;
                btnText.innerText = "Entrar Ahora";
            }
        }
    </script>
</body>
</html>
