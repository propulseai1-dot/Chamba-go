<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CHAMBA GO | Mis Solicitudes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --main-orange: #f97316; --bg-dark: #020617; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .app-shell { max-width: 450px; margin: 0 auto; min-height: 100vh; background: #020617; position: relative; display: flex; flex-direction: column; }
        .hero-mesh { background-image: radial-gradient(at 0% 0%, rgba(249, 115, 22, 0.12) 0, transparent 50%), radial-gradient(at 100% 100%, rgba(249, 115, 22, 0.05) 0, transparent 50%); }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 2rem; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1); }
        @keyframes popIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .tab-bar-wrapper { position: fixed; bottom: 25px; width: 100%; max-width: 450px; padding: 0 20px; z-index: 1000; left: 50%; transform: translateX(-50%); }
        .tab-bar { width: 100%; height: 75px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 25px; display: grid; grid-template-columns: repeat(5, 1fr); align-items: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .tab-item { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: #64748b; cursor: pointer; }
        .tab-item.active { color: var(--main-orange); }
        .plus-button { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); width: 60px; height: 60px; background: var(--main-orange); border-radius: 20px; display: flex; align-items: center; justify-content: center; color: #000; font-size: 24px; border: 6px solid #020617; box-shadow: 0 10px 20px rgba(249, 115, 22, 0.3); }
        
        .section-title { font-weight: 800; font-size: 10px; text-transform: uppercase; letter-spacing: 0.3em; color: rgba(249, 115, 22, 0.5); margin-bottom: 1rem; margin-left: 0.5rem; font-style: italic; display: flex; align-items: center; gap: 0.5rem; }
        .section-title::after { content: ""; flex: 1; height: 1px; background: linear-gradient(90deg, rgba(249,115,22,0.2), transparent); }
    </style>
</head>
<body class="h-full bg-slate-950 text-white">

    <div class="app-shell hero-mesh">
        <header class="px-6 pt-12 pb-6 flex justify-between items-center sticky top-0 bg-slate-950/80 backdrop-blur-md z-50">
            <div>
                <h1 class="text-2xl font-black italic uppercase tracking-tighter leading-none">
                    MIS <span class="text-orange-500">CHAMBAS</span>
                </h1>
                <p class="text-[8px] font-black uppercase tracking-[0.2em] text-slate-500 italic mt-2">Gestion de servicios</p>
            </div>
            <div onclick="window.location.href='perfil.html'" class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center border border-white/10 cursor-pointer">
                <i class="fa-solid fa-user text-xs"></i>
            </div>
        </header>

        <main id="myJobsList" class="flex-1 px-6 pt-4 space-y-4 overflow-y-auto no-scrollbar pb-40"></main>

        <div class="tab-bar-wrapper">
            <nav class="tab-bar">
                <div class="tab-item" onclick="window.location.href='index.html'">
                    <i class="fa-solid fa-house text-xl"></i>
                    <span class="text-[8px] font-black uppercase italic">Inicio</span>
                </div>
                <div class="tab-item" onclick="window.location.href='marketplace.html'">
                    <i class="fa-solid fa-briefcase text-xl"></i>
                    <span class="text-[8px] font-black uppercase italic">Market</span>
                </div>
                <div class="relative flex justify-center items-center">
                    <div onclick="window.location.href='solicitar.html'" class="plus-button">
                        <i class="fa-solid fa-plus text-black"></i>
                    </div>
                </div>
                <div class="tab-item" onclick="window.location.href='mensajes.html'">
                    <i class="fa-solid fa-comment text-xl"></i>
                    <span class="text-[8px] font-black uppercase italic">Chat</span>
                </div>
                <div class="tab-item active" onclick="window.location.href='mis_chambas.html'">
                    <i class="fa-solid fa-list-check text-xl"></i>
                    <span class="text-[8px] font-black uppercase italic">Mis Solicitudes</span>
                </div>
            </nav>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _supabase = supabase.createClient('https://thjzjwyosyxsgjfcignp.supabase.co', 'sb_publishable_ugM18BI_W0G-pu-mY-0a7g_omiUa7rT');
        const myPhone = localStorage.getItem('userPhone');
        let currentRating = 5;

        async function loadMyJobs() {
            const list = document.getElementById('myJobsList');
            if (!myPhone) {
                list.innerHTML = `<p class="text-center text-slate-500 text-[10px] font-black py-20">Inicia sesión para ver tus solicitudes</p>`;
                return;
            }

            const { data: jobs, error } = await _supabase.from('jobs').select('*').eq('client_phone', myPhone).order('created_at', { ascending: false });
            if (error) {
                list.innerHTML = `<p class="text-center text-red-500 text-[10px] font-black py-20">Error de conexión</p>`;
                return;
            }

            const { data: allApps } = await _supabase.from('applications').select('*');

            if (!jobs || jobs.length === 0) {
                list.innerHTML = `<div class="py-20 text-center opacity-30"><i class="fa-solid fa-folder-open text-2xl mb-4 block"></i><p class="uppercase font-black text-[9px]">No has pedido nada aún</p></div>`;
                return;
            }

            const activeJobs = [];
            const searchingJobs = [];
            const completedJobs = [];

            jobs.forEach(j => {
                const app = allApps.find(a => a.job_id === j.id && (a.status === 'accepted' || a.status === 'pro_finished'));
                if (j.status === 'completed') completedJobs.push(j);
                else if (app) activeJobs.push(j);
                else searchingJobs.push(j);
            });

            let html = "";
            if (activeJobs.length > 0) {
                html += `<div class="section-title">Trabajos en curso</div>`;
                activeJobs.forEach(j => html += renderClientCard(j, allApps));
            }
            if (searchingJobs.length > 0) {
                html += `<div class="section-title mt-8">Buscando profesionales</div>`;
                searchingJobs.forEach(j => html += renderClientCard(j, allApps));
            }
            if (completedJobs.length > 0) {
                html += `<div class="section-title mt-8">Historial finalizado</div>`;
                completedJobs.forEach(j => html += renderClientCard(j, allApps));
            }
            list.innerHTML = html;
        }

        function renderClientCard(j, allApps) {
            const acceptedApp = allApps.find(a => a.job_id === j.id && (a.status === 'accepted' || a.status === 'pro_finished' || a.status === 'completed'));
            let statusHtml = "";
            let actionBtn = "";

            if (j.status === 'completed') {
                statusHtml = `<span class="text-slate-500 font-black text-[8px] uppercase italic">Finalizado ✅</span>`;
                actionBtn = `<button class="w-full mt-4 bg-white/5 text-slate-500 py-4 rounded-2xl font-black text-[10px] cursor-not-allowed uppercase">Servicio Completado</button>`;
            } 
            else if (acceptedApp) {
                if (acceptedApp.status === 'pro_finished') {
                    statusHtml = `<span class="text-emerald-500 animate-pulse font-black text-[8px] uppercase italic">¡El pro terminó el trabajo!</span>`;
                    actionBtn = `
                        <div class="flex gap-2 mt-4">
                            <button onclick="window.location.href='chat.html?jobId=${j.id}'" class="flex-1 bg-white/10 text-white py-4 rounded-2xl font-black text-[10px] border border-white/10">CHAT</button>
                            <button onclick="liberarPago('${j.id}', '${acceptedApp.id}', '${acceptedApp.pro_phone}', ${j.total_price})" class="flex-[2] bg-emerald-500 text-black py-4 rounded-2xl font-black text-[10px] shadow-lg shadow-emerald-500/20 active:scale-95 transition-all">LIBERAR PAGO ⚡</button>
                        </div>`;
                } else {
                    statusHtml = `<span class="text-sky-500 font-black text-[8px] uppercase italic">En curso con ${acceptedApp.pro_name}</span>`;
                    actionBtn = `<button onclick="window.location.href='chat.html?jobId=${j.id}'" class="w-full mt-4 bg-white/10 text-white py-4 rounded-2xl font-black text-[10px] border border-white/10 active:scale-95 transition-all uppercase"><i class="fa-solid fa-comment mr-2"></i> Hablar con el pro</button>`;
                }
            } else {
                const postulantsCount = allApps.filter(a => a.job_id === j.id && a.status === 'pending').length;
                statusHtml = `<span class="text-orange-500/70 font-black text-[8px] uppercase italic">${postulantsCount} postulantes nuevos</span>`;
                actionBtn = `<button onclick="window.location.href='postulantes.html?jobId=${j.id}'" class="w-full mt-4 bg-orange-500 text-black py-4 rounded-2xl font-black text-[10px] shadow-lg shadow-orange-500/20 active:scale-95 transition-all uppercase">Ver postulantes</button>`;
            }

            return `
            <div class="glass-card p-6 pop-in mb-4 ${acceptedApp?.status === 'pro_finished' ? 'border-emerald-500/50 bg-emerald-500/5' : ''}">
                <div class="flex justify-between items-start mb-2">
                    <div class="flex flex-col">
                        ${statusHtml}
                        <h3 class="text-sm font-black uppercase text-white italic mt-1">${j.title}</h3>
                    </div>
                    <span class="text-lg font-black text-white italic tracking-tighter">$${j.total_price}</span>
                </div>
                <p class="text-[10px] font-bold text-slate-500 italic line-clamp-1 mb-2">${j.description}</p>
                ${actionBtn}
            </div>`;
        }

        async function liberarPago(jobId, appId, proPhone, totalPrice) {
            const seguro = confirm(`¿Confirmas que pagaste $${totalPrice} en efectivo al Pro y que el trabajo está bien hecho?`);
            if (!seguro) return;

            // 1. Calcul de la commission (20%)
            const commission = totalPrice * 0.20;

            // 2. Mises à jour simultanées : Job terminé + Application terminée
            const { error: e1 } = await _supabase.from('jobs').update({ status: 'completed' }).eq('id', jobId);
            const { error: e2 } = await _supabase.from('applications').update({ status: 'completed' }).eq('id', appId);

            if (!e1 && !e2) {
                // 3. LOGIQUE UBER/GLOVO : Mise à jour de la dette du Pro
                // On récupère d'abord sa balance actuelle
                const { data: profile } = await _supabase.from('profiles').select('balance').eq('phone', proPhone).single();
                const currentBalance = profile?.balance || 0;
                const newBalance = currentBalance - commission;

                // On met à jour son profil avec le nouveau solde négatif
                await _supabase.from('profiles').update({ balance: newBalance }).eq('phone', proPhone);

                openRatingModal(jobId, proPhone);
            } else {
                alert("Error al procesar el pago final.");
            }
        }

        function openRatingModal(jobId, proPhone) {
            const modalHtml = `
            <div id="ratingModal" class="fixed inset-0 z-[2000] flex items-center justify-center px-6">
                <div class="absolute inset-0 bg-slate-950/90 backdrop-blur-sm"></div>
                <div class="glass-card p-8 w-full max-w-sm relative pop-in border-orange-500/30">
                    <h2 class="text-xl font-black italic uppercase text-center mb-2">¡Misión Cumplida!</h2>
                    <p class="text-[10px] text-slate-400 text-center uppercase font-bold tracking-widest mb-6">Califica al profesional</p>
                    <div class="flex justify-center gap-3 mb-8 text-2xl">
                        <i onclick="setStar(1)" id="star-1" class="fa-solid fa-star text-orange-500 cursor-pointer transition-all"></i>
                        <i onclick="setStar(2)" id="star-2" class="fa-solid fa-star text-orange-500 cursor-pointer transition-all"></i>
                        <i onclick="setStar(3)" id="star-3" class="fa-solid fa-star text-orange-500 cursor-pointer transition-all"></i>
                        <i onclick="setStar(4)" id="star-4" class="fa-solid fa-star text-orange-500 cursor-pointer transition-all"></i>
                        <i onclick="setStar(5)" id="star-5" class="fa-solid fa-star text-orange-500 cursor-pointer transition-all"></i>
                    </div>
                    <textarea id="reviewComment" placeholder="Un breve comentario..." class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-xs text-white focus:outline-none focus:border-orange-500 mb-6 h-24 italic font-bold"></textarea>
                    <button onclick="saveReview('${jobId}', '${proPhone}')" class="w-full bg-orange-500 text-black py-4 rounded-2xl font-black uppercase text-[10px] shadow-lg shadow-orange-500/40">Enviar Opinión</button>
                </div>
            </div>`;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            setStar(5);
        }

        function setStar(num) {
            currentRating = num;
            for (let i = 1; i <= 5; i++) {
                const star = document.getElementById('star-' + i);
                if (star) star.style.opacity = i <= num ? "1" : "0.2";
            }
        }

        async function saveReview(jobId, proPhone) {
            const comment = document.getElementById('reviewComment').value;
            const { error } = await _supabase.from('reviews').insert([{
                job_id: jobId,
                pro_phone: proPhone,
                client_phone: myPhone,
                rating: currentRating,
                comment: comment
            }]);

            if (!error) {
                alert("¡Gracias por tu reseña!");
                const modal = document.getElementById('ratingModal');
                if (modal) modal.remove();
                loadMyJobs();
            }
        }

        window.onload = loadMyJobs;
    </script>
</body>
</html>
