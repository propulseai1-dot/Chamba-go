<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CHAMBA GO | Mis Solicitudes</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --main-orange: #f97316; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; margin: 0; }
        .app-container { width: 100%; max-width: 450px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
        .hero-mesh { background-image: radial-gradient(at 0% 0%, rgba(249, 115, 22, 0.1) 0, transparent 50%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 2rem; }
        .pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1); }
        @keyframes popIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Navigation IDENTIQUE au modèle fourni */
        .tab-bar-wrapper { position: fixed; bottom: 15px; width: 100%; max-width: 450px; padding: 0 15px; z-index: 1000; left: 50%; transform: translateX(-50%); }
        .tab-bar { width: 100%; height: 75px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 25px; display: grid; grid-template-columns: repeat(5, 1fr); align-items: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5); position: relative; }
        .tab-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #64748b; cursor: pointer; transition: all 0.2s; }
        .tab-item.active { color: var(--main-orange); }
        .plus-button { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); width: 60px; height: 60px; background: var(--main-orange); border-radius: 20px; display: flex; align-items: center; justify-content: center; color: #000; font-size: 24px; border: 6px solid #020617; box-shadow: 0 10px 20px rgba(249, 115, 22, 0.3); }

        .section-title { font-weight: 800; font-size: 10px; text-transform: uppercase; letter-spacing: 0.3em; color: rgba(249, 115, 22, 0.5); margin-bottom: 1rem; font-style: italic; display: flex; align-items: center; gap: 0.5rem; }
        .section-title::after { content: ""; flex: 1; height: 1px; background: linear-gradient(90deg, rgba(249,115,22,0.2), transparent); }
    </style>
</head>
<body class="h-full">

    <div class="app-container hero-mesh">
        <header class="px-6 pt-12 pb-4 flex justify-between items-center sticky top-0 bg-slate-950/80 backdrop-blur-md z-50">
            <div>
                <h1 class="text-xl font-black italic tracking-tighter uppercase leading-none">MIS <span class="text-orange-500">CHAMBAS</span></h1>
                <p class="text-[8px] font-black uppercase tracking-[0.2em] text-slate-500 italic mt-1">Gestion de servicios</p>
            </div>
            <div onclick="location.href='perfil.html'" class="w-10 h-10 bg-white/5 border border-white/10 rounded-xl flex items-center justify-center cursor-pointer">
                <i class="fa-solid fa-user text-xs text-orange-500"></i>
            </div>
        </header>

        <main id="myJobsList" class="flex-1 overflow-y-auto px-6 pb-44 no-scrollbar pt-6">
            <div class="py-20 text-center">
                <i class="fa-solid fa-circle-notch animate-spin text-orange-500 text-2xl"></i>
            </div>
        </main>

        <div class="tab-bar-wrapper">
            <nav class="tab-bar">
                <div class="tab-item" onclick="location.href='index.html'">
                    <i class="fa-solid fa-house text-xl"></i>
                    <span class="text-[8px] font-black uppercase italic mt-1">Inicio</span>
                </div>

                <div class="tab-item active" onclick="location.href='mis_chambas.html'">
                    <i class="fa-solid fa-list-check text-xl"></i>
                    <span class="text-[8px] font-black uppercase italic mt-1">Pedidos</span>
                </div>

                <div class="relative flex justify-center items-center">
                    <div onclick="location.href='solicitar.html'" class="plus-button">
                        <i class="fa-solid fa-plus"></i>
                    </div>
                </div>

                <div class="tab-item" onclick="location.href='mensajes.html'">
                    <i class="fa-solid fa-comment text-xl"></i>
                    <span class="text-[8px] font-black uppercase italic mt-1">Chat</span>
                </div>

                <div class="tab-item" onclick="location.href='perfil.html'">
                    <i class="fa-solid fa-user text-xl"></i>
                    <span class="text-[8px] font-black uppercase italic mt-1">Perfil</span>
                </div>
            </nav>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://thjzjwyosyxsgjfcignp.supabase.co', 'sb_publishable_ugM18BI_W0G-pu-mY-0a7g_omiUa7rT');
        const myPhone = localStorage.getItem('userPhone');

        async function loadMyJobs() {
            const list = document.getElementById('myJobsList');
            if (!myPhone) {
                list.innerHTML = `<p class="text-center text-slate-500 text-[10px] font-black py-20 uppercase tracking-widest">Inicia sesión para ver tus chambas</p>`;
                return;
            }

            const { data: jobs, error } = await _supabase.from('jobs').select('*').eq('client_phone', myPhone).order('created_at', { ascending: false });
            
            if (error) {
                list.innerHTML = `<p class="text-center text-red-500 text-[10px] font-black py-20">Error de conexión</p>`;
                return;
            }

            if (!jobs || jobs.length === 0) {
                list.innerHTML = `<div class="py-20 text-center opacity-30"><i class="fa-solid fa-folder-open text-2xl mb-4 block"></i><p class="uppercase font-black text-[9px]">Aún no has pedido nada</p></div>`;
                return;
            }

            // Rendu des cartes (Logique simplifiée pour l'exemple)
            let html = `<div class="section-title">Mis Solicitudes</div>`;
            jobs.forEach(j => {
                html += `
                <div class="glass-card p-6 pop-in mb-4">
                    <div class="flex justify-between items-start">
                        <h3 class="text-sm font-black uppercase italic text-white">${j.title}</h3>
                        <span class="text-orange-500 font-black italic">$${j.total_price}</span>
                    </div>
                    <p class="text-[10px] text-slate-500 mt-2 font-bold uppercase line-clamp-1">${j.description}</p>
                    <button onclick="location.href='postulantes.html?jobId=${j.id}'" class="w-full mt-4 bg-white/5 border border-white/10 py-3 rounded-xl font-black text-[9px] uppercase tracking-widest hover:bg-white/10 transition-all">Ver Detalles</button>
                </div>`;
            });
            list.innerHTML = html;
        }

        window.onload = loadMyJobs;
    </script>
</body>
</html>
