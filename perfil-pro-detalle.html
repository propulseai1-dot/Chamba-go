<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CHAMBA GO | Perfil Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --main-orange: #f97316; --bg-dark: #020617; }
        body { background-color: var(--bg-dark); font-family: 'Plus Jakarta Sans', sans-serif; color: white; margin: 0; }
        .app-shell { max-width: 450px; margin: 0 auto; min-height: 100vh; background: var(--bg-dark); position: relative; padding-bottom: 120px; }
        .profile-header { background: linear-gradient(to bottom, rgba(249, 115, 22, 0.15), transparent); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 2.5rem; }
        .badge-verified { background: linear-gradient(45deg, #0ea5e9, #2563eb); }
    </style>
</head>
<body class="h-full">

    <div class="app-shell">
        <div class="profile-header p-6 pt-12 text-center relative">
            <button onclick="history.back()" class="absolute left-6 top-12 w-10 h-10 bg-black/20 backdrop-blur-md rounded-xl flex items-center justify-center border border-white/10 active:scale-90 transition-all">
                <i class="fa-solid fa-chevron-left text-white"></i>
            </button>
            
            <div class="relative inline-block mb-4">
                <div class="w-32 h-32 bg-slate-800 rounded-[2.5rem] border-4 border-orange-500/20 overflow-hidden mx-auto shadow-2xl">
                    <img id="proImage" src="https://ui-avatars.com/api/?background=f97316&color=fff&size=128" class="w-full h-full object-cover">
                </div>
                <div class="absolute -bottom-2 -right-2 w-10 h-10 badge-verified rounded-full flex items-center justify-center border-4 border-slate-950 shadow-lg">
                    <i class="fa-solid fa-check text-white text-xs"></i>
                </div>
            </div>

            <h1 id="proName" class="text-2xl font-black italic uppercase tracking-tighter text-white">---</h1>
            <div class="flex items-center justify-center gap-2 mt-1">
                <span id="proCategory" class="text-[9px] font-black text-orange-500 uppercase tracking-widest bg-orange-500/10 px-3 py-1 rounded-full border border-orange-500/20">---</span>
            </div>
        </div>

        <main class="p-6 space-y-6">
            <div class="grid grid-cols-3 gap-4">
                <div class="glass-card p-4 text-center">
                    <p class="text-xl font-black text-white leading-none">4.9</p>
                    <p class="text-[7px] font-black text-slate-500 uppercase mt-2 tracking-widest">Rating</p>
                </div>
                <div class="glass-card p-4 text-center">
                    <p id="jobsCount" class="text-xl font-black text-white leading-none">--</p>
                    <p class="text-[7px] font-black text-slate-500 uppercase mt-2 tracking-widest">Jobs</p>
                </div>
                <div class="glass-card p-4 text-center">
                    <p class="text-xl font-black text-white leading-none">100%</p>
                    <p class="text-[7px] font-black text-slate-500 uppercase mt-2 tracking-widest">Éxito</p>
                </div>
            </div>

            <div class="glass-card p-8">
                <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] mb-4 italic">Sobre el profesional</h3>
                <p id="proBio" class="text-sm text-slate-300 leading-relaxed font-medium">---</p>
            </div>

            <div>
                <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] mb-4 italic ml-2">Portafolio</h3>
                <div class="grid grid-cols-2 gap-3">
                    <div class="aspect-square bg-white/5 border border-white/10 rounded-3xl overflow-hidden grayscale hover:grayscale-0 transition-all cursor-pointer">
                        <img src="https://images.unsplash.com/photo-1581578731548-c64695cc6958?auto=format&fit=crop&w=300&q=80" class="w-full h-full object-cover opacity-50">
                    </div>
                    <div class="aspect-square bg-white/5 border border-white/10 rounded-3xl overflow-hidden grayscale hover:grayscale-0 transition-all cursor-pointer">
                        <img src="https://images.unsplash.com/photo-1621905251189-08b45d6a269e?auto=format&fit=crop&w=300&q=80" class="w-full h-full object-cover opacity-50">
                    </div>
                </div>
            </div>
        </main>

        <div class="fixed bottom-10 left-0 w-full px-6 max-w-sm left-1/2 -translate-x-1/2">
            <button onclick="hirePro()" class="w-full bg-orange-500 py-5 rounded-[2rem] font-black uppercase text-xs text-black shadow-2xl shadow-orange-500/40 active:scale-95 transition-all flex items-center justify-center gap-3">
                Contratar este Pro <i class="fa-solid fa-bolt"></i>
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _supabase = supabase.createClient('https://thjzjwyosyxsgjfcignp.supabase.co', 'sb_publishable_ugM18BI_W0G-pu-mY-0a7g_omiUa7rT');

        async function loadProDetails() {
            const urlParams = new URLSearchParams(window.location.search);
            const proPhone = urlParams.get('phone');

            if (!proPhone) { history.back(); return; }

            try {
                // 1. Récupérer les infos du pro
                const { data: pro, error } = await _supabase
                    .from('users')
                    .select('*')
                    .eq('phone', proPhone)
                    .single();

                if (pro) {
                    document.getElementById('proName').innerText = pro.name;
                    document.getElementById('proCategory').innerText = pro.role === 'pro' ? 'Especialista' : 'Generalista';
                    document.getElementById('proBio').innerText = pro.bio || "Este profesional aún no ha redactado su biografía, pero está verificado por Chamba Go.";
                    document.getElementById('proImage').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(pro.name)}&background=f97316&color=fff&size=128`;
                    
                    // 2. Simuler ou compter ses jobs terminés
                    const { count } = await _supabase
                        .from('applications')
                        .select('*', { count: 'exact', head: true })
                        .eq('pro_phone', proPhone)
                        .eq('status', 'accepted');
                    
                    document.getElementById('jobsCount').innerText = count || "12"; // On met 12 par défaut pour le style
                }
            } catch (err) {
                console.error(err);
            }
        }

        function hirePro() {
            alert("¡Excelente elección! Iniciando canal de comunicación seguro...");
            // Ici, on redirigera vers le chat interne plus tard
        }

        window.onload = loadProDetails;
    </script>
</body>
</html>
