<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CHAMBA GO | Perfil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --main-orange: #f97316; }
        .hero-mesh { background-image: radial-gradient(at 0% 0%, rgba(249, 115, 22, 0.1) 0, transparent 50%); }
        .tab-bar-wrapper { position: fixed; bottom: 15px; width: 100%; max-width: 450px; padding: 0 15px; left: 50%; transform: translateX(-50%); z-index: 100; }
        .tab-bar { height: 75px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 25px; display: grid; grid-template-columns: repeat(5, 1fr); }
        .tab-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #64748b; font-size: 20px; }
        .tab-item.active { color: var(--main-orange); }
        .plus-button { position: absolute; top: -28px; left: 50%; transform: translateX(-50%); width: 58px; height: 58px; background: var(--main-orange); border-radius: 20px; display: flex; align-items: center; justify-content: center; border: 5px solid #020617; color: black; font-size: 24px; }
    </style>
</head>
<body class="h-full bg-slate-950 text-white hero-mesh">

    <header class="px-6 pt-12 pb-6 flex justify-between items-center max-w-sm mx-auto">
        <h1 class="text-2xl font-black italic uppercase tracking-tighter">MI <span class="text-orange-500">PERFIL</span></h1>
        <button onclick="logout()" class="w-10 h-10 bg-white/5 rounded-xl border border-white/10 text-red-500 flex items-center justify-center">
            <i class="fa-solid fa-power-off text-sm"></i>
        </button>
    </header>

    <main id="mainContent" class="hidden max-w-sm mx-auto px-6 pb-40">
        
        <div class="flex flex-col items-center my-8">
            <div class="relative">
                <img id="userAvatar" src="https://i.pravatar.cc/150?u=fallback" class="w-32 h-32 rounded-[2.5rem] border-2 border-orange-500 p-1 object-cover">
                <label class="absolute -bottom-1 -right-1 bg-orange-500 text-black w-9 h-9 rounded-full flex items-center justify-center border-4 border-[#020617] cursor-pointer">
                    <i class="fa-solid fa-plus text-xs"></i>
                    <input type="file" id="photoInput" class="hidden" accept="image/*" onchange="uploadPhoto(this)">
                </label>
            </div>
            <h2 id="userNameDisplay" class="mt-5 text-2xl font-black italic uppercase tracking-tighter">---</h2>
            <div class="flex items-center gap-2 mt-1">
                <i class="fa-solid fa-circle-check text-orange-500 text-[10px]"></i>
                <p id="userRoleDisplay" class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] italic">---</p>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-4 mb-8">
            <div class="bg-white/5 border border-white/10 p-5 rounded-3xl">
                <p class="text-[8px] font-black text-slate-600 uppercase tracking-widest mb-1">WhatsApp de contacto</p>
                <p id="userPhoneDisplay" class="text-lg font-black tracking-widest">---</p>
            </div>
        </div>

        <div class="space-y-3">
            <div class="p-5 bg-white/5 border border-white/10 rounded-2xl flex justify-between items-center cursor-pointer active:scale-95 transition-all">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-orange-500/10 rounded-xl flex items-center justify-center text-orange-500">
                        <i class="fa-solid fa-receipt"></i>
                    </div>
                    <span class="text-xs font-black uppercase italic">Mis Trabajos</span>
                </div>
                <i class="fa-solid fa-chevron-right text-slate-700 text-[10px]"></i>
            </div>
            
            <div class="p-5 bg-white/5 border border-white/10 rounded-2xl flex justify-between items-center cursor-pointer active:scale-95 transition-all">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-blue-500/10 rounded-xl flex items-center justify-center text-blue-500">
                        <i class="fa-solid fa-shield-halved"></i>
                    </div>
                    <span class="text-xs font-black uppercase italic">Seguridad</span>
                </div>
                <i class="fa-solid fa-chevron-right text-slate-700 text-[10px]"></i>
            </div>
        </div>
    </main>

    <div class="tab-bar-wrapper">
        <nav class="tab-bar">
            <div class="tab-item" onclick="location.href='index.html'"><i class="fa-solid fa-house"></i></div>
            <div class="tab-item" id="dynamicNavBtn"></div>
            <div class="relative">
                <div class="plus-button" onclick="location.href='solicitar.html'"><i class="fa-solid fa-plus"></i></div>
            </div>
            <div class="tab-item" onclick="location.href='mensajes.html'"><i class="fa-solid fa-comment"></i></div>
            <div class="tab-item active"><i class="fa-solid fa-user"></i></div>
        </nav>
    </div>

    <script>
        const _supabase = supabase.createClient('https://thjzjwyosyxsgjfcignp.supabase.co', 'sb_publishable_ugM18BI_W0G-pu-mY-0a7g_omiUa7rT');

        async function loadProfile() {
            const phone = localStorage.getItem('userPhone');
            if (!phone) { window.location.href = 'login.html'; return; }

            try {
                const { data: user, error } = await _supabase
                    .from('users')
                    .select('*')
                    .eq('phone', phone)
                    .maybeSingle();

                if (user) {
                    document.getElementById('userNameDisplay').innerText = user.name;
                    document.getElementById('userPhoneDisplay').innerText = user.phone;
                    
                    const isJobber = (user.role === 'jobber' || user.role === 'pro');
                    document.getElementById('userRoleDisplay').innerText = isJobber ? 'Jobber Verificado' : 'Cliente Gold';
                    
                    if (user.foto) document.getElementById('userAvatar').src = user.foto;

                    // Navigation dynamique
                    const navBtn = document.getElementById('dynamicNavBtn');
                    if (isJobber) {
                        navBtn.onclick = () => location.href = 'marketplace.html';
                        navBtn.innerHTML = '<i class="fa-solid fa-briefcase"></i>';
                    } else {
                        navBtn.onclick = () => location.href = 'categorias.html';
                        navBtn.innerHTML = '<i class="fa-solid fa-compass"></i>';
                    }

                    document.getElementById('mainContent').classList.remove('hidden');
                }
            } catch (err) { console.error(err); }
        }

        async function uploadPhoto(input) {
            if (!input.files || !input.files[0]) return;
            const file = input.files[0];
            const phone = localStorage.getItem('userPhone');
            const fileName = `avatars/${phone}_${Date.now()}.png`;

            try {
                const { error: upErr } = await _supabase.storage.from('avatars').upload(fileName, file);
                if (upErr) throw upErr;

                const { data: { publicUrl } } = _supabase.storage.from('avatars').getPublicUrl(fileName);
                await _supabase.from('users').update({ foto: publicUrl }).eq('phone', phone);
                
                document.getElementById('userAvatar').src = publicUrl;
                alert("¡Foto actualizada! ✅");
            } catch (err) { alert("Error: " + err.message); }
        }

        function logout() { localStorage.clear(); window.location.href = 'login.html'; }
        window.onload = loadProfile;
    </script>
</body>
</html>
