<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CHAMBA GO | Perfil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --main-orange: #f97316; --bg-dark: #020617; }
        body { background-color: #020617; font-family: 'Plus Jakarta Sans', sans-serif; color: white; margin: 0; }
        .hero-mesh { background-image: radial-gradient(at 0% 0%, rgba(249, 115, 22, 0.1) 0, transparent 50%); }

        /* TAB BAR HARMONISÉE */
        .tab-bar-wrapper { position: fixed; bottom: 15px; width: 100%; max-width: 450px; padding: 0 15px; z-index: 1000; left: 50%; transform: translateX(-50%); }
        .tab-bar { width: 100%; height: 75px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 25px; display: grid; grid-template-columns: repeat(5, 1fr); align-items: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5); position: relative; }
        .tab-item { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: #64748b; cursor: pointer; transition: all 0.3s; }
        .tab-item.active { color: var(--main-orange); }
        
        .plus-button { 
            position: absolute; top: -30px; left: 50%; transform: translateX(-50%); 
            width: 60px; height: 60px; background: var(--main-orange); border-radius: 20px; 
            display: flex; align-items: center; justify-content: center; 
            color: #000; font-size: 24px; border: 6px solid #020617; 
            box-shadow: 0 10px 20px rgba(249, 115, 22, 0.3); z-index: 1100; 
            transition: transform 0.2s ease;
        }
        .plus-button:active { transform: translateX(-50%) scale(0.95); }

        .avatar-glow { box-shadow: 0 0 30px rgba(249, 115, 22, 0.15); }
        .menu-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); aspect-ratio: 1 / 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; border-radius: 2rem; transition: all 0.3s; }
        .glass-wallet { background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%); border: 1px solid rgba(255,255,255,0.1); border-radius: 2.5rem; }
    </style>
</head>
<body class="h-full hero-mesh">

    <div class="max-w-[450px] mx-auto min-h-screen flex flex-col relative">
        
        <header class="px-6 pt-12 pb-6 flex justify-between items-center sticky top-0 bg-slate-950/80 backdrop-blur-md z-50">
            <h1 class="text-2xl font-black italic uppercase tracking-tighter">MI <span class="text-orange-500">PERFIL</span></h1>
            <button onclick="logout()" class="w-10 h-10 bg-white/5 rounded-xl border border-white/10 text-red-500 flex items-center justify-center active:scale-90 transition-transform">
                <i class="fa-solid fa-power-off text-sm"></i>
            </button>
        </header>

        <main id="mainContent" class="hidden px-6 pb-40">
            <div class="flex flex-col items-center my-10">
                <div class="relative">
                    <img id="userAvatar" src="https://ui-avatars.com/api/?name=User&background=0f172a&color=f97316&bold=true" class="w-32 h-32 rounded-[2.8rem] border-2 border-orange-500 p-1 object-cover avatar-glow">
                    <label class="absolute -bottom-1 -right-1 bg-orange-500 text-black w-10 h-10 rounded-full flex items-center justify-center border-4 border-[#020617] cursor-pointer">
                        <i class="fa-solid fa-camera text-xs"></i>
                        <input type="file" id="photoInput" class="hidden" accept="image/*" onchange="uploadPhoto(this)">
                    </label>
                </div>
                <h2 id="userNameDisplay" class="mt-6 text-2xl font-black italic uppercase tracking-tighter text-white">---</h2>
                <div class="flex items-center gap-2 mt-1">
                    <div id="statusDot" class="w-1.5 h-1.5 rounded-full bg-orange-500 animate-pulse"></div>
                    <p id="userRoleDisplay" class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] italic">---</p>
                </div>
            </div>

            <div id="proWalletSection" class="hidden mb-8">
                <div class="glass-wallet p-6 text-center relative overflow-hidden">
                    <p class="text-[9px] font-black uppercase text-slate-500 tracking-[0.2em] mb-1 italic">Saldo de Comisiones</p>
                    <h3 id="balanceDisplay" class="text-4xl font-black italic tracking-tighter mb-4">$0.00</h3>
                    
                    <div class="space-y-2 mb-6">
                        <div class="flex justify-between text-[8px] font-black uppercase italic text-slate-500 px-1">
                            <span id="limitLabel">Límite: $500</span>
                            <span id="debtPercent">0%</span>
                        </div>
                        <div class="w-full bg-white/5 h-2 rounded-full overflow-hidden">
                            <div id="debtBar" class="h-full bg-orange-500 transition-all duration-1000" style="width: 0%"></div>
                        </div>
                    </div>

                    <button onclick="pagarComision()" class="w-full bg-white text-black py-4 rounded-2xl font-black uppercase text-[10px] shadow-xl active:scale-95 transition-all">
                        Pagar Comisión
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div id="btnMainAction" class="menu-card cursor-pointer">
                    <div class="w-14 h-14 bg-orange-500/10 rounded-2xl flex items-center justify-center text-orange-500">
                        <i id="iconMainAction" class="fa-solid fa-receipt text-2xl"></i>
                    </div>
                    <span id="txtMainAction" class="text-[11px] font-black uppercase italic tracking-tight">Mis Chambas</span>
                </div>
                
                <div onclick="location.href='editar-perfil.html'" class="menu-card cursor-pointer">
                    <div class="w-14 h-14 bg-blue-500/10 rounded-2xl flex items-center justify-center text-blue-500">
                        <i class="fa-solid fa-user-pen text-2xl"></i>
                    </div>
                    <span class="text-[11px] font-black uppercase italic tracking-tight text-center">Editar<br>Perfil</span>
                </div>
            </div>
        </main>

        <div id="tabBarContainer" class="tab-bar-wrapper"></div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://thjzjwyosyxsgjfcignp.supabase.co', 'sb_publishable_ugM18BI_W0G-pu-mY-0a7g_omiUa7rT');

        async function loadProfile() {
            const phone = localStorage.getItem('userPhone');
            if (!phone) { window.location.href = 'login.html'; return; }

            try {
                const { data: user } = await _supabase.from('users').select('*').eq('phone', phone).maybeSingle();

                if (user) {
                    document.getElementById('userNameDisplay').innerText = user.name || "Usuario";
                    const isJobber = (user.role === 'pro' || user.role === 'jobber');
                    
                    document.getElementById('userRoleDisplay').innerText = isJobber ? 'PRO VERIFICADO' : 'CLIENTE ELITE';
                    
                    // CONFIGURATION DES CARTES (PRO = Marketplace / CLIENT = Mis Chambas)
                    const mainBtn = document.getElementById('btnMainAction');
                    const mainTxt = document.getElementById('txtMainAction');
                    const mainIcon = document.getElementById('iconMainAction');

                    if (isJobber) {
                        mainTxt.innerText = 'Marketplace';
                        mainIcon.className = 'fa-solid fa-briefcase text-2xl';
                        mainBtn.onclick = () => window.location.href = 'marketplace.html';
                    } else {
                        mainTxt.innerText = 'Mis Chambas';
                        mainIcon.className = 'fa-solid fa-receipt text-2xl';
                        mainBtn.onclick = () => window.location.href = 'mis-chambas.html';
                    }

                    if (user.foto) document.getElementById('userAvatar').src = user.foto;

                    if (isJobber) {
                        document.getElementById('proWalletSection').classList.remove('hidden');
                        const balance = user.balance || 0;
                        const limit = user.max_debt || -500;
                        document.getElementById('balanceDisplay').innerText = `$${Math.abs(balance).toFixed(2)}`;
                        document.getElementById('limitLabel').innerText = `Límite: $${Math.abs(limit)}`;
                        const percent = (Math.abs(balance) / Math.abs(limit)) * 100;
                        document.getElementById('debtBar').style.width = Math.min(percent, 100) + '%';
                        document.getElementById('debtPercent').innerText = Math.round(percent) + '%';
                    }

                    renderTabBar(isJobber);
                    document.getElementById('mainContent').classList.remove('hidden');
                }
            } catch (err) { console.error(err); }
        }

        function renderTabBar(isJobber) {
            const container = document.getElementById('tabBarContainer');
            const secondIcon = isJobber
                ? `<div class="tab-item" onclick="location.href='marketplace.html'"><i class="fa-solid fa-briefcase text-xl"></i><span class="text-[8px] font-black uppercase italic">Market</span></div>`
                : `<div class="tab-item" onclick="location.href='mis-chambas.html'"><i class="fa-solid fa-receipt text-xl"></i><span class="text-[8px] font-black uppercase italic">Mis Chambas</span></div>`;

            const centerBtnAction = isJobber ? "location.href='mis-trabajos-pro.html'" : "location.href='solicitar.html'";
            const centerBtnIcon = isJobber ? "fa-list-check" : "fa-plus";

            container.innerHTML = `
                <nav class="tab-bar">
                    <div class="tab-item" onclick="location.href='index.html'"><i class="fa-solid fa-house text-xl"></i><span class="text-[8px] font-black uppercase italic">Inicio</span></div>
                    ${secondIcon}
                    <div class="relative flex justify-center"><div class="plus-button" onclick="${centerBtnAction}"><i class="fa-solid ${centerBtnIcon}"></i></div></div>
                    <div class="tab-item" onclick="location.href='mensajes.html'"><i class="fa-solid fa-comment text-xl"></i><span class="text-[8px] font-black uppercase italic">Chat</span></div>
                    <div class="tab-item active"><i class="fa-solid fa-user text-xl"></i><span class="text-[8px] font-black uppercase italic">Perfil</span></div>
                </nav>`;
        }

        async function pagarComision() {
            const monto = prompt("Ingresa el monto a abonar:");
            if (!monto || isNaN(monto)) return;
            const phone = localStorage.getItem('userPhone');
            const { data: user } = await _supabase.from('users').select('*').eq('phone', phone).single();
            let newBalance = (user.balance || 0) + parseFloat(monto);
            let newLimit = user.max_debt || -500;
            if (newBalance >= 0) {
                if (newLimit === -500) newLimit = -1000;
                else if (newLimit === -1000) newLimit = -1500;
                alert("¡Felicidades! Has subido de nivel. Tu nuevo límite es $" + Math.abs(newLimit));
            }
            await _supabase.from('users').update({ balance: newBalance, max_debt: newLimit }).eq('phone', phone);
            loadProfile();
        }

        async function uploadPhoto(input) {
            if (!input.files || !input.files[0]) return;
            const file = input.files[0];
            const phone = localStorage.getItem('userPhone');
            const fileName = `avatars/${phone}_${Date.now()}.png`;
            try {
                await _supabase.storage.from('avatars').upload(fileName, file);
                const { data: { publicUrl } } = _supabase.storage.from('avatars').getPublicUrl(fileName);
                await _supabase.from('users').update({ foto: publicUrl }).eq('phone', phone);
                document.getElementById('userAvatar').src = publicUrl;
            } catch (err) { alert("Error: " + err.message); }
        }

        function logout() { localStorage.clear(); window.location.href = 'login.html'; }
        window.onload = loadProfile;
    </script>
</body>
</html>
