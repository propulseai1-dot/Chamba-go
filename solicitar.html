<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CHAMBA GO | Pedir Ayuda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <script>
        if (localStorage.getItem('userRole') !== 'client') {
            window.location.replace('login.html?role=client');
        }
    </script>
</head>
<body class="h-full">

    <div class="app-shell hero-mesh">
        
        <header class="px-6 pt-12 pb-4 flex items-center gap-4">
            <div onclick="window.location.href='index.html'" class="w-10 h-10 glass-card flex items-center justify-center btn-press cursor-pointer">
                <i class="fa-solid fa-arrow-left text-xs text-white"></i>
            </div>
            <h1 class="text-2xl font-black italic tracking-tighter uppercase">
                PEDIR <span class="text-orange-500">AYUDA</span>
            </h1>
        </header>

        <main class="flex-1 px-6 pt-4 pb-32 overflow-y-auto no-scrollbar">
            
            <div class="mb-8 text-center fade-in">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-orange-500/10 rounded-full mb-4 border border-orange-500/20">
                    <i class="fa-solid fa-wand-magic-sparkles text-3xl text-orange-500"></i>
                </div>
                <p class="text-slate-500 text-[10px] font-black uppercase tracking-[0.4em] italic opacity-60">
                    Describe lo que necesitas
                </p>
            </div>

            <div class="glass-card p-8 space-y-6 fade-in">
                <div class="space-y-4">
                    <div class="relative">
                        <label class="text-[9px] font-black uppercase text-slate-500 ml-2 mb-1 block">¿Qué necesitas?</label>
                        <input type="text" id="jobTitle" class="premium-input" placeholder="Ej: Electricista, Mudanza...">
                    </div>

                    <div class="relative">
                        <label class="text-[9px] font-black uppercase text-slate-500 ml-2 mb-1 block">Detalles del trabajo</label>
                        <textarea id="jobDesc" rows="3" class="premium-input pt-4" placeholder="Explica brevemente..."></textarea>
                    </div>

                    <div class="relative">
                        <label class="text-[9px] font-black uppercase text-slate-500 ml-2 mb-1 block">Presupuesto (MXN)</label>
                        <input type="number" id="jobBudget" class="premium-input" placeholder="Ej: 800">
                    </div>

                    <div class="relative">
                        <label class="text-[9px] font-black uppercase text-slate-500 ml-2 mb-1 block">Ubicación</label>
                        <select id="jobLocation" class="premium-input appearance-none bg-slate-900 text-white uppercase text-[10px] font-bold">
                            <option value="Playa del Carmen">Playa del Carmen</option>
                            <option value="Tulum">Tulum</option>
                            <option value="Cancún">Cancún</option>
                        </select>
                    </div>
                </div>
                
                <button onclick="enviarSolicitud()" id="btnSend" class="btn-primary text-[11px] mt-4">
                    <span>Publicar Chamba</span>
                    <i class="fa-solid fa-bolt text-sm"></i>
                </button>
            </div>
        </main>

        <nav class="tab-bar">
            <div class="tab-item" onclick="window.location.href='index.html'">
                <i class="fa-solid fa-house-chimney text-lg"></i>
                <span class="text-[8px] font-black uppercase tracking-widest">Inicio</span>
            </div>
            <div class="tab-item" onclick="window.location.href='marketplace.html'">
                <i class="fa-solid fa-briefcase text-lg"></i>
                <span class="text-[8px] font-black uppercase tracking-widest">Chambas</span>
            </div>
            <div class="tab-item active">
                <div class="w-14 h-14 bg-orange-500 rounded-2xl flex items-center justify-center text-black shadow-lg shadow-orange-500/40 -mt-12 border-[6px] border-[#020617]">
                    <i class="fa-solid fa-plus text-xl"></i>
                </div>
            </div>
            <div class="tab-item">
                <i class="fa-solid fa-comment-dots text-lg"></i>
                <span class="text-[8px] font-black uppercase tracking-widest">Mensajes</span>
            </div>
            <div class="tab-item" onclick="window.location.href='dashboard-pro.html'">
                <i class="fa-solid fa-gear text-lg"></i>
                <span class="text-[8px] font-black uppercase tracking-widest">Perfil</span>
            </div>
        </nav>
    </div> 

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://thjzjwyosyxsgjfcignp.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ugM18BI_W0G-pu-mY-0a7g_omiUa7rT';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function enviarSolicitud() {
            const title = document.getElementById('jobTitle').value.trim();
            const desc = document.getElementById('jobDesc').value.trim();
            const budget = document.getElementById('jobBudget').value;
            const location = document.getElementById('jobLocation').value;
            const btn = document.getElementById('btnSend');
            const clientPhone = localStorage.getItem('userPhone');

            if(!title || !desc || !budget) return;

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin text-lg"></i>';

            try {
                const { error } = await supabaseClient.from('jobs').insert([{
                    title, description: desc, budget, location, client_phone: clientPhone, status: 'open'
                }]);
                if (error) throw error;
                window.location.href = 'index.html';
            } catch (err) {
                btn.disabled = false;
                btn.innerHTML = '<span>Publicar Chamba</span> <i class="fa-solid fa-bolt"></i>';
            }
        }
    </script>
</body>
</html>
