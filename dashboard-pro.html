<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CHAMBA GO | Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root { --main-cyan: #22d3ee; --bg-dark: #020617; }
        
        body { 
            background-color: var(--bg-dark); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: white; 
            margin: 0;
        }

        /* --- CONTAINER APP (MAX 450PX) --- */
        .app-shell {
            max-width: 450px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--bg-dark);
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
            border-left: 1px solid rgba(255,255,255,0.05);
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .hero-mesh { 
            background: 
                radial-gradient(circle at 50% -20%, #22d3ee15, transparent),
                radial-gradient(circle at 0% 50%, #f9731610, transparent);
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 2rem;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .pulse-status {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="h-full">

    <div class="app-shell hero-mesh p-6">
        
        <header class="py-6 flex justify-between items-center mb-4">
            <button onclick="window.location.href='marketplace.html'" class="w-12 h-12 flex items-center justify-center bg-white/5 rounded-2xl border border-white/10 active:scale-90 transition-all">
                <i class="fa-solid fa-briefcase text-cyan-400"></i>
            </button>
            <h1 class="text-xl font-black italic text-cyan-400 uppercase tracking-tighter leading-none">PRO <span class="text-white">PANEL</span></h1>
            <button onclick="localStorage.clear(); window.location.href='index.html'" class="w-12 h-12 flex items-center justify-center bg-white/5 rounded-2xl border border-white/10 active:scale-90 transition-all text-red-500/50">
                <i class="fa-solid fa-power-off"></i>
            </button>
        </header>

        <div class="flex items-center gap-5 mb-8 p-2">
            <div class="relative group">
                <img id="proAvatar" src="https://ui-avatars.com/api/?name=P&background=1e293b&color=22d3ee" alt="Perfil" 
                     class="w-20 h-20 rounded-3xl object-cover border-2 border-white/10 shadow-2xl cursor-pointer transition-all group-active:scale-90"
                     onclick="window.location.href='verificacion.html'">
                <div id="statusDot" class="absolute -bottom-1 -right-1 w-6 h-6 rounded-full border-4 border-[#020617] bg-slate-500 pulse-status"></div>
            </div>
            
            <div>
                <p class="text-slate-500 text-[10px] font-black uppercase tracking-[0.3em] mb-1 italic">Bienvenido,</p>
                <h2 id="proName" class="text-2xl font-black italic text-white uppercase tracking-tighter leading-none">Cargando...</h2>
                
                <div id="statusBadge" class="mt-3 inline-flex items-center px-3 py-1 rounded-lg bg-white/5 border border-white/10">
                    <span id="statusText" class="text-[8px] font-black uppercase tracking-widest text-slate-500 italic">Verificando...</span>
                </div>
            </div>
        </div>

        <div class="h-[1px] w-full bg-gradient-to-r from-transparent via-white/10 to-transparent mb-8"></div>

        <div class="flex items-center justify-between mb-6">
            <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] italic">Mis chambas activas</h3>
            <span class="w-2 h-2 rounded-full bg-cyan-400 animate-pulse"></span>
        </div>
        
        <div id="myJobs" class="space-y-4 flex-grow overflow-y-auto no-scrollbar pb-10">
            <div class="py-10 text-center opacity-20 italic font-black uppercase text-[9px] tracking-[0.3em]">
                Buscando tus chambas...
            </div>
        </div>

    </div> <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://thjzjwyosyxsgjfcignp.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ugM18BI_W0G-pu-mY-0a7g_omiUa7rT';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const userPhone = localStorage.getItem('userPhone');

        async function loadProfileHeader() {
            if (!userPhone) return;

            const { data, error } = await supabaseClient
                .from('profiles')
                .select('full_name, avatar_url, verification_status')
                .eq('phone', userPhone)
                .single();

            if (data) {
                const name = data.full_name || 'Trabajador';
                document.getElementById('proName').innerText = name;
                
                const fallback = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=1e293b&color=22d3ee&bold=true`;
                const avatarImg = document.getElementById('proAvatar');
                avatarImg.src = data.avatar_url ? (data.avatar_url + '?t=' + new Date().getTime()) : fallback;

                const badge = document.getElementById('statusBadge');
                const text = document.getElementById('statusText');
                const dot = document.getElementById('statusDot');

                if (data.verification_status === 'verified') {
                    badge.className = "mt-3 inline-flex items-center px-3 py-1 rounded-lg bg-cyan-500/10 border border-cyan-500/20";
                    text.innerText = "Pro Verificado ✅";
                    text.className = "text-[8px] font-black uppercase tracking-widest text-cyan-400 italic";
                    dot.className = "absolute -bottom-1 -right-1 w-6 h-6 rounded-full border-4 border-[#020617] bg-cyan-500 pulse-status";
                } 
                else if (data.verification_status === 'pending') {
                    badge.className = "mt-3 inline-flex items-center px-3 py-1 rounded-lg bg-orange-500/10 border border-orange-500/20";
                    text.innerText = "En Revisión ⏳";
                    text.className = "text-[8px] font-black uppercase tracking-widest text-orange-500 italic";
                    dot.className = "absolute -bottom-1 -right-1 w-6 h-6 rounded-full border-4 border-[#020617] bg-orange-500 pulse-status";
                }
            }
        }

        async function loadMyJobs() {
            const list = document.getElementById('myJobs');
            const { data } = await supabaseClient.from('missions').select('*').eq('pro_phone', userPhone).order('created_at', { ascending: false });

            if (!data || data.length === 0) {
                list.innerHTML = `
                    <div class="py-16 text-center glass-card border-dashed bg-transparent opacity-40">
                        <p class="uppercase font-black text-[9px] tracking-[0.3em]">Sin chambas activas</p>
                    </div>`;
                return;
            }

            list.innerHTML = data.map(m => `
                <div class="glass-card p-6 border-l-4 border-cyan-400 shadow-xl">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-[9px] font-black uppercase text-cyan-400 bg-cyan-400/10 px-3 py-1 rounded-lg tracking-widest italic border border-cyan-400/20">
                            En curso
                        </span>
                        <span class="text-xl font-black italic text-white tracking-tighter">$${m.price}</span>
                    </div>
                    <p class="text-sm font-bold italic text-slate-300 leading-tight mb-6">"${m.description}"</p>
                    <div class="pt-5 border-t border-white/5 flex justify-between items-center">
                        <div class="flex flex-col">
                            <span class="text-[8px] font-black text-slate-500 uppercase tracking-widest">Cliente</span>
                            <span class="text-[11px] font-black uppercase tracking-tighter text-white">${m.client_name || 'Usuario'}</span>
                        </div>
                        <button onclick="window.location.href='chat.html?id=${m.id}'" class="bg-cyan-400 text-black text-[10px] font-black px-6 py-3 rounded-xl uppercase active:scale-90 transition-all flex items-center gap-2 shadow-lg shadow-cyan-400/20">
                            Chat <i class="fa-solid fa-comment-dots"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        window.onload = () => { loadProfileHeader(); loadMyJobs(); };
    </script>
</body>
</html>
