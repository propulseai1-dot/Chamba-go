<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CHAMBA GO | Seguridad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --main-orange: #f97316; }
        body { background-color: #020617; font-family: 'Plus Jakarta Sans', sans-serif; color: white; margin: 0; }
        .hero-mesh { background-image: radial-gradient(at 0% 100%, rgba(249, 115, 22, 0.05) 0, transparent 50%); }
        .card-glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); }
    </style>
</head>
<body class="h-full hero-mesh">

    <div class="max-w-[450px] mx-auto min-h-screen flex flex-col p-6">
        
        <header class="flex items-center gap-4 mb-10 pt-6">
            <div onclick="window.location.href='perfil.html'" class="w-10 h-10 bg-white/5 border border-white/10 rounded-xl flex items-center justify-center cursor-pointer active:scale-90 transition-transform">
                <i class="fa-solid fa-arrow-left text-xs"></i>
            </div>
            <h1 class="text-xl font-black italic uppercase tracking-tighter">SEGURIDAD <span class="text-orange-500">Y DATOS</span></h1>
        </header>

        <main class="space-y-6">
            
            <section class="space-y-4">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest italic">Tus datos de acceso</p>
                
                <div class="card-glass p-6 rounded-[2rem] space-y-4">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-slate-400">
                            <i class="fa-solid fa-phone text-xs"></i>
                        </div>
                        <div>
                            <p class="text-[9px] font-bold text-slate-500 uppercase tracking-tighter">WhatsApp Verificado</p>
                            <p id="displayPhone" class="text-sm font-bold tracking-widest">---</p>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-4 pt-4 border-t border-white/5">
                        <div class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-slate-400">
                            <i class="fa-solid fa-calendar text-xs"></i>
                        </div>
                        <div>
                            <p class="text-[9px] font-bold text-slate-500 uppercase tracking-tighter">Miembro desde</p>
                            <p id="displayDate" class="text-sm font-bold italic uppercase">---</p>
                        </div>
                    </div>
                </div>
            </section>

            <section class="space-y-4">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest italic">Privacidad</p>
                
                <div class="card-glass p-2 rounded-3xl">
                    <div class="flex items-center justify-between p-4">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid fa-eye-slash text-orange-500 text-xs"></i>
                            <span class="text-xs font-bold uppercase italic">Perfil público</span>
                        </div>
                        <div class="w-10 h-5 bg-orange-500 rounded-full relative">
                            <div class="absolute right-1 top-1 w-3 h-3 bg-black rounded-full"></div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="pt-10">
                <div class="bg-red-500/5 border border-red-500/10 p-6 rounded-[2rem] space-y-4">
                    <h3 class="text-red-500 text-xs font-black uppercase italic italic">Zona de Peligro</h3>
                    <p class="text-[11px] text-slate-500 leading-relaxed">Si decides eliminar tu cuenta, todos tus datos, historial de chambas y mensajes serán borrados permanentemente de Tulum.</p>
                    
                    <button onclick="confirmDelete()" class="w-full py-4 bg-red-500/10 border border-red-500/20 rounded-2xl text-red-500 text-[10px] font-black uppercase italic hover:bg-red-500 hover:text-white transition-all">
                        Eliminar mi cuenta permanentemente
                    </button>
                </div>
            </section>

        </main>

        <footer class="mt-auto py-10 text-center">
            <p class="text-[9px] font-bold text-slate-700 uppercase tracking-widest">CHAMBA GO V.1.0.4 - TULUM</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _supabase = supabase.createClient('https://thjzjwyosyxsgjfcignp.supabase.co', 'sb_publishable_ugM18BI_W0G-pu-mY-0a7g_omiUa7rT');

        async function init() {
            const phone = localStorage.getItem('userPhone');
            if(!phone) return;

            const { data: user, error } = await _supabase
                .from('users')
                .select('*')
                .eq('phone', phone)
                .single();

            if(user) {
                document.getElementById('displayPhone').innerText = user.phone;
                const date = new Date(user.created_at);
                document.getElementById('displayDate').innerText = date.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
            }
        }

        async function confirmDelete() {
            const confirmacion = confirm("¿Estás seguro? Esta acción no se puede deshacer y perderás todo tu historial.");
            if(confirmacion) {
                const phone = localStorage.getItem('userPhone');
                
                // 1. Supprimer l'utilisateur de la table
                const { error } = await _supabase
                    .from('users')
                    .delete()
                    .eq('phone', phone);

                if(!error) {
                    alert("Cuenta eliminada con éxito. Esperamos verte pronto en Tulum.");
                    localStorage.clear();
                    window.location.href = 'login.html';
                } else {
                    alert("Error al eliminar la cuenta.");
                }
            }
        }

        window.onload = init;
    </script>
</body>
</html>
