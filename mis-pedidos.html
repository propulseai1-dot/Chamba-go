<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CHAMBA GO | Mis Pedidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --main-orange: #f97316; --bg-dark: #020617; }
        body { background-color: var(--bg-dark); font-family: 'Plus Jakarta Sans', sans-serif; color: white; margin: 0; }
        .app-shell { max-width: 450px; margin: 0 auto; min-height: 100vh; background: var(--bg-dark); position: relative; padding-bottom: 120px; }
        .hero-mesh { background: radial-gradient(circle at 100% 0%, #f9731610, transparent 40%); }
        .job-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 2rem; transition: all 0.2s; }
        
        /* --- BLOC NAVIGATION UNIFIÉ (COPIE INDEX) --- */
        .tab-bar-wrapper { 
            position: fixed; bottom: 15px; width: 100%; max-width: 450px; 
            padding: 0 15px; z-index: 1000; left: 50%; transform: translateX(-50%);
        }
        .tab-bar { 
            width: 100%; height: 75px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 25px; 
            display: grid; grid-template-columns: repeat(5, 1fr); 
            align-items: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .tab-item { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: #64748b; cursor: pointer; transition: all 0.3s; }
        .tab-item.active { color: var(--main-orange); }
        .plus-button {
            position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
            width: 60px; height: 60px; background: var(--main-orange); border-radius: 20px;
            display: flex; align-items: center; justify-content: center; 
            color: #000; font-size: 24px; border: 6px solid #020617;
            box-shadow: 0 10px 20px rgba(249, 115, 22, 0.3); z-index: 1100;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-full">

    <div class="app-shell hero-mesh p-6">
        
        <header class="py-6 flex justify-between items-center mb-8">
            <h1 class="text-2xl font-black italic text-white uppercase tracking-tighter">
                MIS <span class="text-orange-500">PEDIDOS</span>
            </h1>
            <div onclick="location.href='perfil.html'" class="w-10 h-10 bg-white/5 border border-white/10 rounded-xl flex items-center justify-center cursor-pointer">
                <i class="fa-solid fa-user text-xs text-white"></i>
            </div>
        </header>

        <div class="flex gap-2 mb-8 overflow-x-auto pb-2 no-scrollbar">
            <div class="bg-orange-500 text-black px-5 py-2 rounded-full text-[10px] font-black uppercase italic">Activos</div>
            <div class="bg-white/5 text-slate-500 px-5 py-2 rounded-full text-[10px] font-black uppercase italic border border-white/5">Historial</div>
        </div>

        <div id="pedidosList" class="space-y-4">
            <div class="py-20 text-center opacity-20">
                <i class="fa-solid fa-circle-notch animate-spin text-2xl text-orange-500"></i>
            </div>
        </div>

        <div class="tab-bar-wrapper">
            <nav class="tab-bar">
                <div class="tab-item" onclick="location.href='index.html'">
                    <i class="fa-solid fa-house text-xl"></i>
                    <span class="text-[8px] font-black uppercase italic">Inicio</span>
                </div>

                <div class="tab-item" onclick="location.href='categorias.html'">
                    <i class="fa-solid fa-compass text-xl"></i>
                    <span class="text-[8px] font-black uppercase italic">Explorar</span>
                </div>

                <div class="relative flex justify-center items-center">
                    <div onclick="location.href='crear-mision.html'" class="plus-button">
                        <i class="fa-solid fa-plus"></i>
                    </div>
                </div>

                <div class="tab-item active">
                    <i class="fa-solid fa-rectangle-list text-xl"></i>
                    <span class="text-[8px] font-black uppercase italic">Pedidos</span>
                </div>
                
                <div class="tab-item" onclick="location.href='perfil.html'">
                    <i class="fa-solid fa-user text-xl"></i>
                    <span class="text-[8px] font-black uppercase italic">Perfil</span>
                </div>
            </nav>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _supabase = supabase.createClient('https://thjzjwyosyxsgjfcignp.supabase.co', 'sb_publishable_ugM18BI_W0G-pu-mY-0a7g_omiUa7rT');

        async function loadMyPedidos() {
            const phone = localStorage.getItem('userPhone');
            const container = document.getElementById('pedidosList');

            if (!phone) {
                container.innerHTML = `<p class="text-center text-slate-500 uppercase text-[10px] font-black py-10">Inicia sesión para ver tus pedidos</p>`;
                return;
            }

            try {
                const { data: jobs, error } = await _supabase
                    .from('jobs')
                    .select('*')
                    .eq('client_phone', phone)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (jobs.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-20 bg-white/5 rounded-[2.5rem] border border-dashed border-white/10">
                            <p class="text-slate-500 uppercase text-[10px] font-black tracking-widest">No has pedido nada aún</p>
                        </div>`;
                    return;
                }

                container.innerHTML = '';
                
                for (const job of jobs) {
                    const { count } = await _supabase
                        .from('applications')
                        .select('*', { count: 'exact', head: true })
                        .eq('job_id', job.id);

                    container.innerHTML += `
                        <div class="job-card p-6 active:scale-[0.98] transition-all mb-4" onclick="location.href='ver-postulantes.html?id=${job.id}'">
                            <div class="flex justify-between items-start mb-4">
                                <span class="text-[8px] font-black uppercase px-3 py-1 bg-orange-500/10 text-orange-500 rounded-full border border-orange-500/20">${job.status}</span>
                                <span class="text-xl font-black italic">$${job.price}</span>
                            </div>
                            <h3 class="text-lg font-black uppercase italic tracking-tighter leading-tight mb-2">${job.title}</h3>
                            
                            <div class="flex items-center justify-between pt-4 border-t border-white/5 mt-4">
                                <div class="flex items-center gap-2">
                                    <div class="w-8 h-8 rounded-xl bg-orange-500 flex items-center justify-center text-black font-black text-xs">
                                        ${count}
                                    </div>
                                    <span class="text-[10px] font-black text-slate-400 uppercase italic">Pros postulados</span>
                                </div>
                                <i class="fa-solid fa-chevron-right text-slate-700 text-xs"></i>
                            </div>
                        </div>
                    `;
                }
            } catch (err) {
                container.innerHTML = `<p class="text-red-500 text-center text-[10px] font-black py-10">Error de conexión</p>`;
            }
        }

        window.onload = loadMyPedidos;
    </script>
</body>
</html>
