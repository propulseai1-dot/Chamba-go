<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CHAMBA GO | Registro Cliente</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        :root { --main-orange: #f97316; }
        .hero-mesh { 
            background-image: radial-gradient(at 0% 0%, rgba(249, 115, 22, 0.12) 0, transparent 50%), 
                              radial-gradient(at 100% 0%, rgba(249, 115, 22, 0.05) 0, transparent 50%);
        }
        .app-shell {
            width: 100%; max-width: 450px; margin: 0 auto;
            min-height: 100vh; display: flex; flex-direction: column;
            background: #020617; position: relative;
        }
        .glass-card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 2.5rem;
        }
        .premium-input {
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 1.2rem; padding: 1.1rem; color: white; outline: none;
            font-size: 11px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .premium-input:focus { border-color: var(--main-orange); background: rgba(255,255,255,0.06); }
        
        .btn-primary {
            width: 100%; background: var(--main-orange); color: black;
            padding: 1.2rem; border-radius: 1.2rem; font-weight: 900;
            text-transform: uppercase; display: flex; align-items: center;
            justify-content: center; gap: 10px; transition: all 0.2s;
            box-shadow: 0 10px 20px rgba(249, 115, 22, 0.15);
        }
        .btn-primary:active { transform: scale(0.95); }
        .fade-in { animation: fadeIn 0.6s ease-out forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="h-full bg-slate-950">

    <div class="app-shell hero-mesh">
        <header class="px-6 pt-12 pb-6 flex items-center gap-4">
            <div onclick="window.history.back()" class="w-10 h-10 glass-card flex items-center justify-center cursor-pointer active:scale-90 transition-transform">
                <i class="fa-solid fa-arrow-left text-xs text-white"></i>
            </div>
            <h1 class="text-2xl font-black italic tracking-tighter uppercase text-white">
                UNIRSE <span class="text-orange-500">CLIENTE</span>
            </h1>
        </header>

        <main class="flex-1 px-6 pt-2 overflow-y-auto no-scrollbar pb-10">
            <div class="mb-10 text-center fade-in">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-orange-500/10 rounded-3xl mb-6 border border-orange-500/20 rotate-3">
                    <i class="fa-solid fa-user-plus text-3xl text-orange-500"></i>
                </div>
                <p class="text-slate-500 text-[9px] font-black uppercase tracking-[0.3em] italic opacity-70">
                    Tu próxima chamba empieza aquí
                </p>
            </div>

            <div class="glass-card p-8 space-y-5 fade-in">
                <div class="space-y-4">
                    <input type="text" id="regName" class="premium-input" placeholder="NOMBRE COMPLETO">
                    
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-[10px] text-orange-500 font-black italic pointer-events-none">+52</span>
                        <input type="tel" id="regPhone" class="premium-input pl-12" placeholder="WHATSAPP (10 DÍGITOS)" maxlength="10">
                    </div>

                    <input type="password" id="regPass" class="premium-input" placeholder="CONTRASEÑA">
                </div>
                
                <button onclick="registerClient()" id="btnReg" class="btn-primary text-[11px] mt-6">
                    <span id="btnText">Crear Cuenta</span>
                    <i class="fa-solid fa-bolt-lightning text-sm"></i>
                </button>

                <div class="pt-8 text-center border-t border-white/5">
                    <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest leading-loose">
                        ¿Ya tienes cuenta? <br>
                        <a href="login.html" class="text-orange-500 hover:text-white transition-colors underline decoration-orange-500/30 underline-offset-8">Inicia sesión aquí</a>
                    </p>
                </div>
            </div>

            <footer class="mt-12 mb-8 text-center opacity-20">
                <p class="text-[7px] font-black text-white uppercase tracking-[0.6em]">CHAMBA GO NETWORK © 2026</p>
            </footer>
        </main>
    </div> 

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // CONFIGURATION SUPABASE MÉMORISÉE
        const SUPABASE_URL = 'https://thjzjwyosyxsgjfcignp.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ugM18BI_W0G-pu-mY-0a7g_omiUa7rT';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function registerClient() {
            const name = document.getElementById('regName').value.trim();
            const phoneInput = document.getElementById('regPhone').value.trim();
            const pass = document.getElementById('regPass').value.trim();
            const btn = document.getElementById('btnReg');
            const btnText = document.getElementById('btnText');

            // Validation simple
            if(!name || !phoneInput || !pass) return alert("Por favor, completa todos los campos.");
            if(phoneInput.length < 10) return alert("El número debe tener 10 dígitos.");

            // ON AJOUTE LE +52 ICI
            const finalPhone = "+52" + phoneInput;

            btn.disabled = true;
            btnText.innerText = "REGISTRANDO...";

            try {
                // Insertion dans la table 'users' avec les noms de colonnes de ta base
                const { error } = await _supabase
                    .from('users')
                    .insert([
                        { 
                            name: name, 
                            phone: finalPhone, 
                            password: pass, 
                            role: 'cliente' 
                        }
                    ]);

                if (error) throw error;

                alert("¡Cuenta creada con éxito! Ahora puedes entrar.");
                window.location.href = 'login.html';

            } catch (err) {
                console.error("Error:", err);
                alert("Error al registrar: " + err.message);
            } finally {
                btn.disabled = false;
                btnText.innerText = "Crear Cuenta";
            }
        }
    </script>
</body>
</html>
