<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mis Chambas | Debug Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; }
        .app-shell { max-width: 450px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1.5rem; }
        .tab-bar { position: fixed; bottom: 15px; width: calc(100% - 30px); max-width: 420px; height: 70px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; display: grid; grid-template-columns: repeat(5, 1fr); align-items: center; left: 50%; transform: translateX(-50%); }
    </style>
</head>
<body class="h-full">

    <div class="app-shell p-6">
        <header class="mb-8">
            <h1 class="text-2xl font-black italic uppercase italic">MIS <span class="text-orange-500">CHAMBAS</span></h1>
            <p id="debugPhone" class="text-[9px] font-bold text-slate-500 uppercase mt-1 tracking-widest"></p>
        </header>

        <div id="errorDisplay" class="hidden mb-6 p-4 bg-red-500/10 border border-red-500/50 rounded-2xl text-red-500 text-[10px]">
            <p class="font-black uppercase mb-1 underline">⚠️ Error Detectado:</p>
            <div id="errorMessage" class="font-mono"></div>
        </div>

        <main id="myJobsList" class="space-y-4 pb-32">
            <div class="text-center py-10">
                <i class="fa-solid fa-circle-notch animate-spin text-orange-500 text-xl"></i>
            </div>
        </main>

        <nav class="tab-bar">
            <div class="flex flex-col items-center text-slate-500" onclick="location.href='index.html'"><i class="fa-solid fa-house"></i><span class="text-[7px] font-bold mt-1 uppercase">Inicio</span></div>
            <div class="flex flex-col items-center text-orange-500"><i class="fa-solid fa-receipt"></i><span class="text-[7px] font-bold mt-1 uppercase">Pedidos</span></div>
            <div class="flex justify-center"><div class="w-12 h-12 bg-orange-500 rounded-xl flex items-center justify-center text-black" onclick="location.href='solicitar.html'"><i class="fa-solid fa-plus"></i></div></div>
            <div class="flex flex-col items-center text-slate-500" onclick="location.href='mensajes.html'"><i class="fa-solid fa-comment"></i><span class="text-[7px] font-bold mt-1 uppercase">Chat</span></div>
            <div class="flex flex-col items-center text-slate-500" onclick="location.href='perfil.html'"><i class="fa-solid fa-user"></i><span class="text-[7px] font-bold mt-1 uppercase">Perfil</span></div>
        </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _supabase = supabase.createClient('https://thjzjwyosyxsgjfcignp.supabase.co', 'sb_publishable_ugM18BI_W0G-pu-mY-0a7g_omiUa7rT');
        
        async function loadMyChambas() {
            const list = document.getElementById('myJobsList');
            const errDiv = document.getElementById('errorDisplay');
            const errMsg = document.getElementById('errorMessage');
            const debugP = document.getElementById('debugPhone');
            
            const phone = localStorage.getItem('userPhone');
            debugP.innerText = phone ? `TEL: ${phone}` : "NO SE DETECTÓ TELÉFONO EN LOGIN";

            if (!phone) {
                list.innerHTML = "<p class='text-center text-slate-500 text-xs font-bold uppercase'>Inicia sesión para ver tus datos.</p>";
                return;
            }

            // TENTATIVE DE RÉCUPÉRATION
            const { data: jobs, error } = await _supabase
                .from('jobs')
                .select('*')
                .eq('client_phone', phone) // Vérifie bien ce nom dans ta base !
                .order('created_at', { ascending: false });

            if (error) {
                console.error(error);
                errDiv.classList.remove('hidden');
                errMsg.innerHTML = `
                    CODE: ${error.code}<br>
                    MSG: ${error.message}<br>
                    HINT: ${error.hint || 'Revisa si la columna client_phone existe'}
                `;
                list.innerHTML = "";
                return;
            }

            if (jobs.length === 0) {
                list.innerHTML = `
                    <div class="py-20 text-center opacity-30">
                        <i class="fa-solid fa-folder-open text-3xl mb-4"></i>
                        <p class="text-[10px] font-black uppercase tracking-widest">No hay chambas para este número</p>
                    </div>`;
                return;
            }

            // RENDU DES CARTES
            list.innerHTML = jobs.map(j => `
                <div class="glass-card p-5 border-l-4 ${j.status === 'open' ? 'border-orange-500' : 'border-green-500'}">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[8px] font-black uppercase text-slate-500 italic tracking-widest">${j.status}</span>
                        <span class="text-lg font-black italic text-white">$${j.total_price}</span>
                    </div>
                    <h3 class="text-xs font-black uppercase text-white italic mb-1">${j.title}</h3>
                    <p class="text-[10px] font-medium text-slate-400 leading-tight">${j.description}</p>
                </div>
            `).join('');
        }

        window.onload = loadMyChambas;
    </script>
</body>
</html>
