<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CHAMBA GO | Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <style>
        :root { --main-orange: #f97316; --bg-dark: #020617; }
        .app-shell {
            max-width: 450px; margin: 0 auto; min-height: 100vh;
            background: #020617; position: relative;
            display: flex; flex-direction: column;
        }
        .hero-mesh { 
            background-image: radial-gradient(at 0% 0%, rgba(249, 115, 22, 0.12) 0, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(249, 115, 22, 0.05) 0, transparent 50%);
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 2rem;
        }
        .btn-disabled { background: rgba(255,255,255,0.03) !important; color: #475569 !important; border: 1px solid rgba(255,255,255,0.03); cursor: not-allowed; }
        
        /* STYLE DU PETIT BONHOMME (Identique à l'index) */
        .user-btn { 
            width: 40px; height: 40px; background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: all 0.3s;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1); }
        @keyframes popIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* TAB BAR */
        .tab-bar-wrapper { position: fixed; bottom: 25px; width: 100%; max-width: 450px; padding: 0 20px; z-index: 1000; }
        .tab-bar { 
            width: 100%; height: 75px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 25px; display: grid; grid-template-columns: repeat(5, 1fr);
            align-items: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .tab-item { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: #64748b; cursor: pointer; }
        .tab-item.active { color: var(--main-orange); }
        .plus-button {
            position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
            width: 60px; height: 60px; background: var(--main-orange); border-radius: 20px;
            display: flex; align-items: center; justify-content: center; color: #000; font-size: 24px; border: 6px solid #020617;
            box-shadow: 0 10px 20px rgba(249, 115, 22, 0.3);
        }
    </style>
</head>
<body class="h-full bg-slate-950">

    <div class="app-shell hero-mesh">
        
        <header class="px-6 pt-12 pb-6 flex justify-between items-center sticky top-0 bg-slate-950/80 backdrop-blur-md z-50">
            <div>
                <h1 class="text-2xl font-black italic text-white uppercase tracking-tighter leading-none">
                    CHAMBAS <span class="text-orange-500">MARKET</span>
                </h1>
                <div id="statusBadge" class="flex items-center gap-2 mt-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-slate-600 animate-pulse"></span>
                    <p class="text-[8px] font-black uppercase tracking-[0.2em] text-slate-500 italic">Cargando...</p>
                </div>
            </div>
            <div id="profileTrigger" onclick="window.location.href='perfil.html'" class="user-btn active:scale-90">
                <i class="fa-solid fa-user text-xs text-white"></i>
            </div>
        </header>

        <main id="marketList" class="flex-1 px-6 pt-4 space-y-4 overflow-y-auto no-scrollbar pb-40">
            <div class="py-20 text-center opacity-20 italic font-black uppercase text-[10px] tracking-widest text-white">
                <i class="fa-solid fa-satellite-dish animate-bounce mb-4 block text-2xl"></i>
                Buscando misiones...
            </div>
        </main>

        <div class="tab-bar-wrapper">
            <nav class="tab-bar">
                <div class="tab-item" onclick="window.location.href='index.html'">
                    <i class="fa-solid fa-house text-xl"></i>
                    <span class="text-[8px] font-black uppercase italic">Inicio</span>
                </div>
                <div class="tab-item active" onclick="window.location.href='marketplace.html'">
                    <i class="fa-solid fa-briefcase text-xl"></i>
                    <span class="text-[8px] font-black uppercase italic">Chambas</span>
                </div>
                <div class="relative flex justify-center items-center">
                    <div onclick="window.location.href='solicitar.html'" class="plus-button">
                        <i class="fa-solid fa-plus text-black"></i>
                    </div>
                </div>
                <div class="tab-item" onclick="window.location.href='mensajes.html'">
                    <i class="fa-solid fa-comment text-xl"></i>
                    <span class="text-[8px] font-black uppercase italic">Chat</span>
                </div>
                <div class="tab-item" onclick="window.location.href='comunidad.html'">
                    <i class="fa-solid fa-users text-xl"></i>
                    <span class="text-[8px] font-black uppercase italic">Pros</span>
                </div>
            </nav>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://thjzjwyosyxsgjfcignp.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ugM18BI_W0G-pu-mY-0a7g_omiUa7rT';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let isVerified = false;

        async function initMarketplace() {
            const phone = localStorage.getItem('userPhone');
            const badge = document.getElementById('statusBadge');
            const profileTrigger = document.getElementById('profileTrigger');

            if (!phone) {
                badge.innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-slate-500"></span><span class="text-slate-500 text-[8px] font-black uppercase tracking-widest italic">Invitado</span>';
                loadMarket();
                return;
            }

            try {
                const { data: profile } = await supabaseClient
                    .from('profiles')
                    .select('verification_status, avatar_url')
                    .eq('phone', phone)
                    .single();

                if (profile) {
                    // Si l'utilisateur a une photo, on remplace le bonhomme par sa photo
                    if (profile.avatar_url) {
                        profileTrigger.innerHTML = `<img src="${profile.avatar_url}" class="w-full h-full object-cover rounded-xl">`;
                    }
                    
                    if (profile.verification_status === 'verified') {
                        isVerified = true;
                        badge.innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-green-500"></span><span class="text-green-500 text-[8px] font-black uppercase tracking-widest italic">Pro Verificado</span>';
                    } else {
                        badge.innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-orange-500/50"></span><span class="text-orange-500/50 text-[8px] font-black uppercase tracking-widest italic">En espera</span>';
                    }
                } else {
                    badge.innerHTML = '<span class="text-slate-500 text-[8px] font-black uppercase italic">Invitado</span>';
                }
            } catch (err) {
                badge.innerHTML = '<span class="text-red-500 text-[8px] font-black uppercase italic">Offline</span>';
            }
            
            loadMarket();
        }

        async function loadMarket() {
            const list = document.getElementById('marketList');
            const { data, error } = await supabaseClient
                .from('missions')
                .select('*')
                .eq('status', 'open')
                .order('created_at', { ascending: false });

            if (error) {
                list.innerHTML = `<p class="text-center text-red-500 text-[10px] font-black uppercase py-10">Error de conexión</p>`;
                return;
            }

            if (!data || data.length === 0) {
                list.innerHTML = `
                    <div class="py-20 text-center glass-card border-dashed bg-transparent opacity-30 mx-2">
                        <i class="fa-solid fa-wind text-2xl mb-4 block"></i>
                        <p class="uppercase font-black text-[9px] tracking-[0.2em]">No hay chambas disponibles</p>
                    </div>`;
                return;
            }

            list.innerHTML = data.map(m => {
                const btnClass = isVerified ? 'bg-orange-500 text-black' : 'btn-disabled';
                const btnText = isVerified ? 'Aceptar Chamba ⚡' : 'Solo Verificados';
                const action = isVerified ? `onclick="aceptarChamba('${m.id}')"` : '';

                return `
                <div class="glass-card p-6 pop-in shadow-xl">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex flex-col">
                            <span class="text-[7px] font-black uppercase text-slate-600 tracking-widest italic mb-1">ID #${m.id.slice(0,5)}</span>
                            <span class="text-2xl font-black italic text-white tracking-tighter">$${m.price}</span>
                        </div>
                        <div class="w-10 h-10 bg-white/5 rounded-xl border border-white/5 flex items-center justify-center">
                            <i class="fa-solid fa-bolt-lightning ${isVerified ? 'text-orange-500' : 'text-slate-700'}"></i>
                        </div>
                    </div>
                    <p class="text-sm font-bold text-slate-400 italic mb-6 leading-snug">"${m.description}"</p>
                    <button ${action} class="w-full ${btnClass} py-4 rounded-2xl font-black uppercase text-[10px] active:scale-95 transition-all tracking-widest">
                        ${btnText}
                    </button>
                </div>
                `;
            }).join('');
        }

        async function aceptarChamba(id) {
            if (!isVerified) return;
            const proPhone = localStorage.getItem('userPhone');
            const proName = localStorage.getItem('userName');
            const { error } = await supabaseClient.from('missions').update({ 
                status: 'in_progress', pro_name: proName, pro_phone: proPhone 
            }).eq('id', id);
            if (error) alert("Error: " + error.message);
            else window.location.href = 'dashboard-pro.html';
        }

        window.onload = initMarketplace;
    </script>
</body>
</html>
