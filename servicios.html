<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CHAMBA GO | Servicios</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        .service-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.8rem;
            padding: 2.2rem 1rem; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            min-height: 150px; /* Légèrement plus haut pour le confort visuel */
        }

        .service-card:active {
            transform: scale(0.92); /* Effet de pression plus marqué */
            background: rgba(249, 115, 22, 0.1);
            border-color: #f97316;
        }

        .icon-box {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.2rem;
            color: #f97316;
            font-size: 2rem; /* Plus grand pour mobile */
            height: 45px;
        }
        
        .service-label {
            font-size: 11px; /* Augmenté pour la lisibilité mobile */
            font-weight: 900;
            text-transform: uppercase;
            color: white;
            letter-spacing: -0.02em; /* Correction de l'erreur VS Code */
            line-height: 1.3;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body class="h-full bg-slate-950">

    <div class="app-shell hero-mesh">
        
        <header class="px-6 pt-12 pb-8 flex items-center gap-4">
            <div onclick="window.location.href='index.html'" class="w-10 h-10 glass-card flex items-center justify-center cursor-pointer active:scale-90 transition-transform">
                <i class="fa-solid fa-arrow-left text-xs text-white"></i>
            </div>
            <div>
                <h1 class="text-2xl font-black text-white uppercase italic tracking-tighter">
                    NUESTROS <span class="text-orange-500">SERVICIOS</span>
                </h1>
                <p class="text-slate-500 text-[9px] font-bold uppercase tracking-[0.3em] mt-1">¿Qué necesitas hoy?</p>
            </div>
        </header>

        <main class="flex-1 px-6 pb-20 overflow-y-auto no-scrollbar">
            <div class="grid grid-cols-2 gap-4">
                
                <div class="service-card" onclick="window.location.href='solicitar.html?cat=mandados'">
                    <div class="icon-box"><i class="fa-solid fa-cart-shopping"></i></div>
                    <p class="service-label">Mandados y Compras</p>
                </div>

                <div class="service-card" onclick="window.location.href='solicitar.html?cat=mascotas'">
                    <div class="icon-box"><i class="fa-solid fa-dog"></i></div>
                    <p class="service-label">Paseo de Mascotas</p>
                </div>

                <div class="service-card" onclick="window.location.href='solicitar.html?cat=limpieza'">
                    <div class="icon-box"><i class="fa-solid fa-broom"></i></div>
                    <p class="service-label">Limpieza de Casa</p>
                </div>

                <div class="service-card" onclick="window.location.href='solicitar.html?cat=reparaciones'">
                    <div class="icon-box"><i class="fa-solid fa-screwdriver-wrench"></i></div>
                    <p class="service-label">Reparaciones / Pro</p>
                </div>

                <div class="service-card" onclick="window.location.href='solicitar.html?cat=ayuda_casa'">
                    <div class="icon-box"><i class="fa-solid fa-hand-holding-heart"></i></div>
                    <p class="service-label">Ayuda en Casa</p>
                </div>

                <div class="service-card" onclick="window.location.href='solicitar.html?cat=entregas'">
                    <div class="icon-box"><i class="fa-solid fa-box-open"></i></div>
                    <p class="service-label">Envío de Paquetes</p>
                </div>

                <div class="service-card" onclick="window.location.href='solicitar.html?cat=lavanderia'">
                    <div class="icon-box"><i class="fa-solid fa-shirt"></i></div>
                    <p class="service-label">Lavandería</p>
                </div>

                <div class="service-card" onclick="window.location.href='solicitar.html?cat=mudanzas'">
                    <div class="icon-box"><i class="fa-solid fa-truck-ramp-box"></i></div>
                    <p class="service-label">Mudanzas Rápidas</p>
                </div>

            </div>
        </main>

    </div>

    <script src="navigation.js"></script>
</body>
</html>
