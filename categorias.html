<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CHAMBA GO | Categorías</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --main-orange: #f97316; --bg-dark: #020617; }

        .app-container {
            width: 100%; max-width: 450px; margin: 0 auto;
            position: relative; min-height: 100vh;
            display: flex; flex-direction: column; background: #020617;
        }

        /* --- BLOC NAVIGATION UNIFIÉ --- */
.tab-bar-wrapper { 
    position: fixed; bottom: 15px; width: 100%; max-width: 450px; 
    padding: 0 15px; z-index: 1000; left: 50%; transform: translateX(-50%);
}

.tab-bar { 
    width: 100%; height: 75px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 25px; 
    display: grid; grid-template-columns: repeat(5, 1fr); 
    align-items: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
    position: relative;
}

.tab-item { 
    display: flex; flex-direction: column; align-items: center; justify-content: center; 
    gap: 4px; color: #64748b; cursor: pointer; transition: all 0.3s;
}

.tab-item.active { color: var(--main-orange); }

.plus-button {
    position: absolute; top: -28px; left: 50%; transform: translateX(-50%);
    width: 58px; height: 58px; background: var(--main-orange); border-radius: 20px;
    display: flex; align-items: center; justify-content: center; 
    color: #000; font-size: 22px; border: 5px solid #020617;
    box-shadow: 0 10px 20px rgba(249, 115, 22, 0.3); z-index: 1100;
}
        /* CATEGORY CARDS */
        .category-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px; padding: 20px; display: flex;
            flex-direction: column; align-items: center; text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .category-card:active { transform: scale(0.95); background: rgba(249, 115, 22, 0.1); }

        .icon-box {
            width: 50px; height: 50px; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 12px; font-size: 20px;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .hero-mesh { background-image: radial-gradient(at 0% 0%, rgba(249, 115, 22, 0.1) 0, transparent 50%), radial-gradient(at 100% 0%, rgba(249, 115, 22, 0.05) 0, transparent 50%); }
        
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .zoom-in { animation: zoomIn 0.3s ease forwards; }
    </style>
</head>
<body class="h-full bg-black">

    <div class="app-container hero-mesh">

        <header class="px-6 pt-12 pb-6 flex items-center justify-between sticky top-0 z-50 backdrop-blur-md bg-slate-950/50">
            <div class="flex items-center gap-4">
                <div onclick="window.history.back()" class="w-10 h-10 bg-white/5 border border-white/10 rounded-xl flex items-center justify-center cursor-pointer active:scale-90 transition-transform">
                    <i class="fa-solid fa-arrow-left text-xs text-white"></i>
                </div>
                <h1 class="text-2xl font-black italic tracking-tighter uppercase text-white">EXPLORAR <span class="text-orange-500">PROS</span></h1>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto px-6 pb-44 no-scrollbar">
            <p class="text-slate-500 text-[10px] font-black uppercase tracking-[0.2em] mb-6">Categorías Populares</p>

            <div class="grid grid-cols-2 gap-4">
                <div onclick="window.location.href='comunidad.html?cat=hogar'" class="category-card zoom-in">
                    <div class="icon-box bg-blue-500/20 text-blue-400"><i class="fa-solid fa-house-chimney"></i></div>
                    <span class="text-white text-[11px] font-black uppercase italic">Hogar</span>
                    <span class="text-[9px] text-slate-500 font-bold mt-1">42 Pros</span>
                </div>

                <div onclick="window.location.href='comunidad.html?cat=mantenimiento'" class="category-card zoom-in" style="animation-delay: 0.05s">
                    <div class="icon-box bg-orange-500/20 text-orange-400"><i class="fa-solid fa-screwdriver-wrench"></i></div>
                    <span class="text-white text-[11px] font-black uppercase italic">Reparos</span>
                    <span class="text-[9px] text-slate-500 font-bold mt-1">28 Pros</span>
                </div>

                <div onclick="window.location.href='comunidad.html?cat=limpieza'" class="category-card zoom-in" style="animation-delay: 0.1s">
                    <div class="icon-box bg-cyan-500/20 text-cyan-400"><i class="fa-solid fa-broom"></i></div>
                    <span class="text-white text-[11px] font-black uppercase italic">Limpieza</span>
                    <span class="text-[9px] text-slate-500 font-bold mt-1">56 Pros</span>
                </div>

                <div onclick="window.location.href='comunidad.html?cat=cocina'" class="category-card zoom-in" style="animation-delay: 0.15s">
                    <div class="icon-box bg-red-500/20 text-red-400"><i class="fa-solid fa-utensils"></i></div>
                    <span class="text-white text-[11px] font-black uppercase italic">Cocina</span>
                    <span class="text-[9px] text-slate-500 font-bold mt-1">19 Pros</span>
                </div>

                <div onclick="window.location.href='comunidad.html?cat=jardin'" class="category-card zoom-in" style="animation-delay: 0.2s">
                    <div class="icon-box bg-emerald-500/20 text-emerald-400"><i class="fa-solid fa-leaf"></i></div>
                    <span class="text-white text-[11px] font-black uppercase italic">Jardín</span>
                    <span class="text-[9px] text-slate-500 font-bold mt-1">12 Pros</span>
                </div>

                <div onclick="window.location.href='comunidad.html?cat=belleza'" class="category-card zoom-in" style="animation-delay: 0.25s">
                    <div class="icon-box bg-pink-500/20 text-pink-400"><i class="fa-solid fa-scissors"></i></div>
                    <span class="text-white text-[11px] font-black uppercase italic">Belleza</span>
                    <span class="text-[9px] text-slate-500 font-bold mt-1">31 Pros</span>
                </div>

                <div onclick="window.location.href='comunidad.html?cat=mascotas'" class="category-card zoom-in" style="animation-delay: 0.3s">
                    <div class="icon-box bg-indigo-500/20 text-indigo-400"><i class="fa-solid fa-paw"></i></div>
                    <span class="text-white text-[11px] font-black uppercase italic">Mascotas</span>
                    <span class="text-[9px] text-slate-500 font-bold mt-1">15 Pros</span>
                </div>

                <div onclick="window.location.href='comunidad.html?cat=mudanza'" class="category-card zoom-in" style="animation-delay: 0.35s">
                    <div class="icon-box bg-yellow-500/20 text-yellow-400"><i class="fa-solid fa-truck-ramp-box"></i></div>
                    <span class="text-white text-[11px] font-black uppercase italic">Mudanza</span>
                    <span class="text-[9px] text-slate-500 font-bold mt-1">8 Pros</span>
                </div>
            </div>
        </main>

        <div class="tab-bar-wrapper">
            <nav class="tab-bar">
                <div class="tab-item" onclick="window.location.href='index.html'">
                    <i class="fa-solid fa-house text-xl"></i>
                    <span class="text-[8px] font-black uppercase italic">Inicio</span>
                </div>
                
                <div id="dynamicNavBtn" class="tab-item active"></div>
                
                <div class="relative flex justify-center items-center">
                    <div onclick="window.location.href='solicitar.html'" class="plus-button">
                        <i class="fa-solid fa-plus text-black"></i>
                    </div>
                </div>

                <div class="tab-item" onclick="window.location.href='mensajes.html'">
                    <i class="fa-solid fa-comment text-xl"></i>
                    <span class="text-[8px] font-black uppercase italic">Chat</span>
                </div>
                
                <div class="tab-item" onclick="window.location.href='comunidad.html'">
                    <i class="fa-solid fa-users text-xl"></i>
                    <span class="text-[8px] font-black uppercase italic">Pros</span>
                </div>
            </nav>
        </div>
    </div>

    <script>
        function updateNavigation() {
            const dynamicBtn = document.getElementById('dynamicNavBtn');
            const isPro = localStorage.getItem('userRole') === 'pro';

            if (isPro) {
                dynamicBtn.innerHTML = `
                    <div onclick="window.location.href='marketplace.html'" class="flex flex-col items-center">
                        <i class="fa-solid fa-briefcase text-xl"></i>
                        <span class="text-[8px] font-black uppercase italic">Chambas</span>
                    </div>`;
            } else {
                dynamicBtn.innerHTML = `
                    <div onclick="window.location.href='categorias.html'" class="flex flex-col items-center text-orange-500">
                        <i class="fa-solid fa-compass text-xl"></i>
                        <span class="text-[8px] font-black uppercase italic">Explorar</span>
                    </div>`;
            }
        }
        window.onload = updateNavigation;
    </script>
</body>
</html>
