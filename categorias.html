<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CHAMBA GO | Categorías</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --main-orange: #f97316; }

        body { background-color: #020617; font-family: 'Plus Jakarta Sans', sans-serif; color: white; margin: 0; }

        .app-container {
            width: 100%; max-width: 450px; margin: 0 auto;
            position: relative; min-height: 100vh;
            display: flex; flex-direction: column; background: #020617;
        }

        /* --- NAVIGATION (CLONE EXACT) --- */
        .tab-bar-wrapper { 
            position: fixed; bottom: 15px; width: 100%; max-width: 450px; 
            padding: 0 15px; z-index: 1000; left: 50%; transform: translateX(-50%);
        }

        .tab-bar { 
            width: 100%; height: 75px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 25px; 
            display: grid; grid-template-columns: repeat(5, 1fr); 
            align-items: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .tab-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #64748b; cursor: pointer; }
        .tab-item.active { color: var(--main-orange); }

        .plus-button {
            position: absolute; top: -28px; left: 50%; transform: translateX(-50%);
            width: 58px; height: 58px; background: var(--main-orange); border-radius: 20px;
            display: flex; align-items: center; justify-content: center; 
            color: #000; font-size: 22px; border: 5px solid #020617;
            box-shadow: 0 10px 20px rgba(249, 115, 22, 0.3); z-index: 1100;
        }

        /* --- STYLES CATÉGORIES --- */
        .category-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .category-card:active {
            transform: scale(0.95);
            background: rgba(249, 115, 22, 0.1);
            border-color: rgba(249, 115, 22, 0.3);
        }
        .icon-box {
            width: 50px; height: 50px;
            border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .hero-mesh { background-image: radial-gradient(at 0% 0%, rgba(249, 115, 22, 0.1) 0, transparent 50%), radial-gradient(at 100% 0%, rgba(249, 115, 22, 0.05) 0, transparent 50%); }
    </style>
</head>
<body class="h-full bg-black">

    <div class="app-container hero-mesh">
        <header class="px-6 pt-12 pb-6 flex items-center justify-between sticky top-0 z-50 backdrop-blur-md bg-slate-950/50">
            <div class="flex items-center gap-4">
                <div onclick="window.location.href='index.html'" class="w-10 h-10 bg-white/5 border border-white/10 rounded-xl flex items-center justify-center cursor-pointer active:scale-90 transition-transform">
                    <i class="fa-solid fa-arrow-left text-xs text-white"></i>
                </div>
                <h1 class="text-2xl font-black italic tracking-tighter uppercase text-white">EXPLORAR <span class="text-orange-500">CATEGORÍAS</span></h1>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto px-6 pb-44 no-scrollbar">
            <div class="grid grid-cols-1 gap-4 mt-4">
                
                <div onclick="window.location.href='comunidad.html?cat=mantenimiento'" class="category-card p-4 flex items-center gap-4">
                    <div class="icon-box bg-blue-500/10 text-blue-500">
                        <i class="fa-solid fa-screwdriver-wrench"></i>
                    </div>
                    <div>
                        <h3 class="text-sm font-black uppercase italic italic text-white">Mantenimiento</h3>
                        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Plomería, Electricidad, Climas</p>
                    </div>
                </div>

                <div onclick="window.location.href='comunidad.html?cat=limpieza'" class="category-card p-4 flex items-center gap-4">
                    <div class="icon-box bg-teal-500/10 text-teal-500">
                        <i class="fa-solid fa-broom"></i>
                    </div>
                    <div>
                        <h3 class="text-sm font-black uppercase italic text-white">Limpieza</h3>
                        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Hogar, Oficinas, Piscinas</p>
                    </div>
                </div>

                <div onclick="window.location.href='comunidad.html?cat=construccion'" class="category-card p-4 flex items-center gap-4">
                    <div class="icon-box bg-orange-500/10 text-orange-500">
                        <i class="fa-solid fa-trowel-bricks"></i>
                    </div>
                    <div>
                        <h3 class="text-sm font-black uppercase italic text-white">Construcción</h3>
                        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Albañilería, Pintura, Tablaroca</p>
                    </div>
                </div>

                <div onclick="window.location.href='comunidad.html?cat=transporte'" class="category-card p-4 flex items-center gap-4">
                    <div class="icon-box bg-purple-500/10 text-purple-500">
                        <i class="fa-solid fa-truck-fast"></i>
                    </div>
                    <div>
                        <h3 class="text-sm font-black uppercase italic text-white">Transporte</h3>
                        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Fletes, Mudanzas, Taxi pro</p>
                    </div>
                </div>

                <div onclick="window.location.href='comunidad.html?cat=belleza'" class="category-card p-4 flex items-center gap-4">
                    <div class="icon-box bg-pink-500/10 text-pink-500">
                        <i class="fa-solid fa-scissors"></i>
                    </div>
                    <div>
                        <h3 class="text-sm font-black uppercase italic text-white">Belleza & Salud</h3>
                        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Barbería, Uñas, Masajes</p>
                    </div>
                </div>

                <div onclick="window.location.href='comunidad.html?cat=eventos'" class="category-card p-4 flex items-center gap-4">
                    <div class="icon-box bg-yellow-500/10 text-yellow-500">
                        <i class="fa-solid fa-music"></i>
                    </div>
                    <div>
                        <h3 class="text-sm font-black uppercase italic text-white">Eventos</h3>
                        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">DJ, Fotografía, Meseros</p>
                    </div>
                </div>

            </div>
        </main>

        <div class="tab-bar-wrapper">
            <nav class="tab-bar">
                <div class="tab-item" onclick="window.location.href='index.html'">
                    <i class="fa-solid fa-house text-xl"></i>
                    <span class="text-[8px] font-black uppercase italic mt-1">Inicio</span>
                </div>
                
                <div id="dynamicNavBtn" class="tab-item"></div>
                
                <div class="relative flex justify-center items-center">
                    <div id="centerButton" class="plus-button">
                        <i class="fa-solid fa-plus text-black"></i>
                    </div>
                </div>

                <div class="tab-item" onclick="window.location.href='mensajes.html'">
                    <i class="fa-solid fa-comment text-xl"></i>
                    <span class="text-[8px] font-black uppercase italic mt-1">Chat</span>
                </div>
                
                <div class="tab-item" onclick="window.location.href='comunidad.html'">
                    <i class="fa-solid fa-users text-xl"></i>
                    <span class="text-[8px] font-black uppercase italic mt-1">Pros</span>
                </div>
            </nav>
        </div>
    </div>

    <script>
        function updateNavigation() {
            const dynamicBtn = document.getElementById('dynamicNavBtn');
            const centerBtn = document.getElementById('centerButton');
            const isPro = localStorage.getItem('userRole') === 'pro';

            if (isPro) {
                dynamicBtn.onclick = () => window.location.href='marketplace.html';
                dynamicBtn.innerHTML = '<i class="fa-solid fa-briefcase text-xl"></i><span class="text-[8px] font-black uppercase italic mt-1">Chambas</span>';
                centerBtn.onclick = () => window.location.href='mis-trabajos-pro.html';
            } else {
                dynamicBtn.classList.add('active'); // Actif ici sur Categorias
                dynamicBtn.onclick = () => window.location.href='categorias.html';
                dynamicBtn.innerHTML = '<i class="fa-solid fa-compass text-xl"></i><span class="text-[8px] font-black uppercase italic mt-1">Explorar</span>';
                centerBtn.onclick = () => window.location.href='solicitar.html';
            }
        }
        window.onload = updateNavigation;
    </script>
</body>
</html>
