<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chamba GO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --main-orange: #f97316; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; margin: 0; }
        .app-container { width: 100%; max-width: 450px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
        .hero-mesh { background-image: radial-gradient(at 0% 0%, rgba(249, 115, 22, 0.1) 0, transparent 50%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Navigation */
        .tab-bar-wrapper { position: fixed; bottom: 15px; width: 100%; max-width: 450px; padding: 0 15px; z-index: 1000; left: 50%; transform: translateX(-50%); }
        .tab-bar { width: 100%; height: 75px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 25px; display: grid; grid-template-columns: repeat(5, 1fr); align-items: center; }
        .tab-item { display: flex; flex-direction: column; align-items: center; color: #64748b; cursor: pointer; }
        .tab-item.active { color: var(--main-orange); }
        .plus-button { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); width: 60px; height: 60px; background: var(--main-orange); border-radius: 20px; display: flex; align-items: center; justify-content: center; color: #000; font-size: 24px; border: 6px solid #020617; box-shadow: 0 10px 20px rgba(249, 115, 22, 0.3); }

        .cat-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 1.5rem; }
        
        /* Styles Visitor Style Image */
        .orange-card { background: var(--main-orange); border-radius: 2.5rem; position: relative; overflow: hidden; }
        .dark-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 2.5rem; }
        .stat-line { border-right: 1px solid rgba(255,255,255,0.1); }
        .stat-line:last-child { border: none; }

        /* Jauge de commission */
        .progress-container { height: 10px; background: rgba(255,255,255,0.1); border-radius: 20px; overflow: hidden; margin: 12px 0; }
        .progress-bar { height: 100%; background: #f97316; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .blocked-card { border: 2px solid #ef4444 !important; background: rgba(239, 68, 68, 0.1) !important; }
    </style>
</head>
<body class="h-full">

    <div class="app-container hero-mesh">
        <header class="px-6 pt-12 pb-4 flex justify-between items-center sticky top-0 bg-slate-950/80 backdrop-blur-md z-50">
            <h1 class="text-xl font-black italic tracking-tighter uppercase">CHAMBA <span class="text-orange-500">GO</span></h1>
            <div onclick="location.href='perfil.html'" class="w-10 h-10 bg-white/5 border border-white/10 rounded-xl flex items-center justify-center cursor-pointer">
                <i class="fa-solid fa-user text-xs text-orange-500"></i>
            </div>
        </header>

        <main id="mainContent" class="flex-1 overflow-y-auto px-6 pb-44 no-scrollbar">
            
            <div id="visitorUI" class="hidden pt-4 space-y-8">
                <div class="orange-card p-8 min-h-[220px] flex flex-col justify-between shadow-2xl shadow-orange-500/10">
                    <h2 class="text-3xl font-black italic uppercase leading-[0.9] text-black">¿DÓNDE ESTÁ EL<br>PROBLEMA?</h2>
                    <button onclick="location.href='login.html'" class="w-fit mt-6 bg-black text-white text-[10px] font-black uppercase px-6 py-3 rounded-full flex items-center gap-2 active:scale-95 transition-all">
                        PEDIR UN PRO <i class="fa-solid fa-bolt text-orange-500"></i>
                    </button>
                    <i class="fa-solid fa-screwdriver-wrench absolute -bottom-4 -right-4 text-black/10 text-9xl -rotate-12"></i>
                </div>

                <div class="grid grid-cols-3 py-2">
                    <div class="text-center stat-line"><p class="text-xl font-black">500+</p><p class="text-[7px] font-black uppercase text-slate-500">Pros</p></div>
                    <div class="text-center stat-line"><p class="text-xl font-black">15 min</p><p class="text-[7px] font-black uppercase text-slate-500">Respuesta</p></div>
                    <div class="text-center"><p class="text-xl font-black">4.9/5</p><p class="text-[7px] font-black uppercase text-slate-500">Rating</p></div>
                </div>

                <div class="dark-card p-8 border-orange-500/20">
                    <h2 class="text-2xl font-black italic uppercase leading-tight text-white text-center">¿QUIERES GANAR<br><span class="text-orange-500">DINERO?</span></h2>
                    <button onclick="location.href='registro-pro.html'" class="w-full mt-8 bg-white/5 border border-white/10 text-white text-[10px] font-black uppercase py-4 rounded-2xl hover:bg-white/10 active:scale-95 transition-all">
                        SER UN PRO PROFESIONAL
                    </button>
                </div>
            </div>

            <div id="clientUI" class="hidden space-y-8 pt-6">
                <h2 class="text-3xl font-black italic uppercase tracking-tighter text-white leading-none">¿QUÉ CHAMBA<br><span class="text-orange-500">PEDIMOS HOY?</span></h2>
                <div class="grid grid-cols-4 gap-3 mt-6 text-center">
                    <div class="flex flex-col items-center gap-2"><div class="w-14 h-14 cat-card flex items-center justify-center text-orange-500 text-lg"><i class="fa-solid fa-house"></i></div><span class="text-[8px] font-black uppercase italic">Hogar</span></div>
                    <div class="flex flex-col items-center gap-2"><div class="w-14 h-14 cat-card flex items-center justify-center text-orange-500 text-lg"><i class="fa-solid fa-wrench"></i></div><span class="text-[8px] font-black uppercase italic">Técnico</span></div>
                    <div class="flex flex-col items-center gap-2"><div class="w-14 h-14 cat-card flex items-center justify-center text-orange-500 text-lg"><i class="fa-solid fa-truck"></i></div><span class="text-[8px] font-black uppercase italic">Fletes</span></div>
                    <div class="flex flex-col items-center gap-2"><div class="w-14 h-14 cat-card flex items-center justify-center text-slate-500 text-lg"><i class="fa-solid fa-plus"></i></div><span class="text-[8px] font-black uppercase italic">Más</span></div>
                </div>
            </div>

            <div id="proUI" class="hidden space-y-6 pt-6">
                <div class="flex justify-between items-center">
                    <h2 class="text-2xl font-black italic uppercase tracking-tighter text-white leading-none">PANEL<br><span class="text-orange-500">PRO</span></h2>
                    <div id="statusBadge" class="flex items-center gap-2 px-3 py-1.5 rounded-full text-[8px] font-black uppercase border"></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white/5 border border-white/10 p-5 rounded-[2rem]">
                        <p class="text-[8px] font-black text-slate-500 uppercase mb-1">Mis Ganancias</p>
                        <p id="realBalance" class="text-xl font-black text-white">$0.00</p>
                    </div>
                    <div class="bg-orange-500/10 border border-orange-500/20 p-5 rounded-[2rem]">
                        <p class="text-[8px] font-black text-orange-500 uppercase mb-1">Comisión Due</p>
                        <p id="pendingCommission" class="text-xl font-black text-white">$0.00</p>
                    </div>
                </div>
            </div>

            <div id="infoSection" class="mt-12 space-y-4">
                <h3 id="infoTitle" class="text-[10px] font-black uppercase text-orange-500 tracking-widest italic">¿CÓMO FUNCIONA?</h3>
                <div id="infoSteps" class="space-y-3"></div>
            </div>
        </main>

        <div class="tab-bar-wrapper">
            <nav class="tab-bar">
                <div class="tab-item active" onclick="location.href='index.html'"><i class="fa-solid fa-house text-xl"></i><span class="text-[8px] font-black uppercase italic mt-1">Inicio</span></div>
                <div id="dynamicNavBtn" class="tab-item"></div>
                <div class="relative flex justify-center items-center"><div id="centerButton" class="plus-button"></div></div>
                <div class="tab-item" onclick="location.href='mensajes.html'"><i class="fa-solid fa-comment text-xl"></i><span class="text-[8px] font-black uppercase italic mt-1">Chat</span></div>
                <div id="lastNavBtn" class="tab-item"></div>
            </nav>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://thjzjwyosyxsgjfcignp.supabase.co', 'sb_publishable_ugM18BI_W0G-pu-mY-0a7g_omiUa7rT');

        async function initApp() {
            let phone = localStorage.getItem('userPhone');
            if (!phone) return setupVisitor();

            const { data: user } = await _supabase.from('users').select('*').or(`phone.eq.${phone},phone.eq.${Number(phone)}`).maybeSingle();
            if (!user) return setupVisitor();

            user.role === 'jobber' ? setupPro(user) : setupClient(user);
        }

        function setupVisitor() {
            document.getElementById('visitorUI').classList.remove('hidden');
            renderSteps('client');
            setNav('Explorar', 'fa-compass', 'categorias.html', 'fa-plus', 'login.html', 'Login', 'fa-user', 'login.html');
        }

        function setupClient(user) {
            document.getElementById('clientUI').classList.remove('hidden');
            renderSteps('client');
            setNav('Chambas', 'fa-list-check', 'mis_chambas.html', 'fa-plus', 'solicitar.html', 'Perfil', 'fa-user', 'perfil.html');
        }

        function setupPro(user) {
            document.getElementById('proUI').classList.remove('hidden');
            renderSteps('pro');
            setNav('Market', 'fa-briefcase', 'marketplace.html', 'fa-list-check', 'mis-trabajos-pro.html', 'Perfil', 'fa-user', 'perfil.html');
        }

        function renderSteps(mode) {
            const isPro = mode === 'pro';
            const steps = isPro ? 
                [{t:'Busca', d:'Encuentra chambas.'}, {t:'Gana', d:'Cobra tus pagos.'}] :
                [{t:'Pide', d:'Publica gratis.'}, {t:'Elige', d:'Compara pros.'}];
            document.getElementById('infoTitle').innerText = isPro ? '¿CÓMO GANAR?' : '¿CÓMO FUNCIONA?';
            document.getElementById('infoSteps').innerHTML = steps.map((s) => `
                <div class="cat-card p-5 relative border-l-4 border-orange-500">
                    <h4 class="text-xs font-black uppercase italic text-white">${s.t}</h4>
                    <p class="text-[10px] text-slate-400 font-bold uppercase">${s.d}</p>
                </div>`).join('');
        }

        function setNav(label2, icon2, link2, centerIcon, centerLink, label5, icon5, link5) {
            document.getElementById('dynamicNavBtn').innerHTML = `<div onclick="location.href='${link2}'" class="flex flex-col items-center"><i class="fa-solid ${icon2} text-xl"></i><span class="text-[8px] font-black uppercase italic mt-1">${label2}</span></div>`;
            document.getElementById('centerButton').innerHTML = `<i class="fa-solid ${centerIcon}"></i>`;
            document.getElementById('centerButton').onclick = () => location.href = centerLink;
            document.getElementById('lastNavBtn').innerHTML = `<div onclick="location.href='${link5}'" class="flex flex-col items-center"><i class="fa-solid ${icon5} text-xl"></i><span class="text-[8px] font-black uppercase italic mt-1">${label5}</span></div>`;
        }

        window.onload = initApp;
    </script>
</body>
</html>
