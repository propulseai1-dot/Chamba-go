<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CHAMBA GO | Inicio</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --main-orange: #f97316; --bg-dark: #020617; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; margin: 0; }
        .app-container { width: 100%; max-width: 450px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
        .hero-mesh { background-image: radial-gradient(at 0% 0%, rgba(249, 115, 22, 0.1) 0, transparent 50%), radial-gradient(at 100% 0%, rgba(249, 115, 22, 0.05) 0, transparent 50%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Navigation Styles */
        .tab-bar-wrapper { position: fixed; bottom: 15px; width: 100%; max-width: 450px; padding: 0 15px; z-index: 1000; left: 50%; transform: translateX(-50%); }
        .tab-bar { width: 100%; height: 75px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 25px; display: grid; grid-template-columns: repeat(5, 1fr); align-items: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .tab-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #64748b; cursor: pointer; transition: all 0.3s; width: 100%; }
        .tab-item.active { color: var(--main-orange); }
        .plus-button { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); width: 60px; height: 60px; background: var(--main-orange); border-radius: 20px; display: flex; align-items: center; justify-content: center; color: #000; font-size: 24px; border: 6px solid #020617; box-shadow: 0 10px 20px rgba(249, 115, 22, 0.3); transition: transform 0.2s; }
        .plus-button:active { transform: translateX(-50%) scale(0.9); }
    </style>
</head>
<body class="h-full">

    <div class="app-container hero-mesh">
        <header class="px-6 pt-12 pb-4 flex justify-between items-center sticky top-0 bg-slate-950/80 backdrop-blur-md z-50">
            <h1 class="text-2xl font-black italic tracking-tighter uppercase leading-none">CHAMBA <span class="text-orange-500">GO</span></h1>
            <div onclick="location.href='perfil.html'" class="w-10 h-10 bg-white/5 border border-white/10 rounded-xl flex items-center justify-center cursor-pointer active:scale-90 transition-transform">
                <i class="fa-solid fa-user text-xs"></i>
            </div>
        </header>

        <main id="mainContent" class="flex-1 overflow-y-auto px-6 pb-44 no-scrollbar">
            
            <div id="proUI" class="hidden space-y-6">
                <div class="mt-6">
                    <p class="text-[9px] font-black text-slate-500 uppercase tracking-[0.3em] mb-1 italic">Mi Negocio</p>
                    <h2 class="text-2xl font-black italic uppercase tracking-tighter">Panel de <span class="text-orange-500">PRO</span></h2>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white/5 border border-white/10 p-5 rounded-[2rem]">
                        <p class="text-[8px] font-black text-slate-500 uppercase mb-1 tracking-widest">Saldo Total</p>
                        <p id="realBalance" class="text-xl font-black">$0.00</p>
                    </div>
                    <div class="bg-white/5 border border-white/10 p-5 rounded-[2rem]">
                        <p class="text-[8px] font-black text-slate-500 uppercase mb-1 tracking-widest">Trabajos</p>
                        <p id="realJobsCount" class="text-xl font-black">0</p>
                    </div>
                </div>

                <div class="bg-orange-500/10 border border-orange-500/20 p-6 rounded-[2.5rem]">
                    <div class="flex justify-between items-center mb-4">
                        <div>
                            <p class="text-[9px] font-black text-orange-500 uppercase tracking-widest">Comisiones pendientes</p>
                            <p id="pendingCommission" class="text-2xl font-black text-white">$0.00</p>
                        </div>
                        <button onclick="payCommission()" class="bg-orange-500 text-black text-[10px] font-black px-4 py-2 rounded-xl uppercase active:scale-95 transition-transform">
                            Pagar ahora
                        </button>
                    </div>
                    <div class="pt-4 border-t border-white/5 flex justify-between">
                        <p class="text-[8px] font-bold text-slate-500 uppercase">Total pagado histórico:</p>
                        <p id="paidCommission" class="text-[8px] font-black text-white">$0.00</p>
                    </div>
                </div>
            </div>

            <div id="clientUI" class="hidden space-y-6">
                <div class="mt-6">
                    <h2 class="text-2xl font-black italic uppercase tracking-tighter">MIS <span class="text-orange-500">CHAMBAS</span></h2>
                    <div id="clientJobsContainer" class="mt-4 space-y-3"></div>
                </div>
            </div>

            <div id="heroBanner" class="relative overflow-hidden p-8 mt-6 bg-orange-500 rounded-[2.5rem] shadow-xl cursor-pointer active:scale-[0.98] transition-all">
                <div class="relative z-10 text-black">
                    <h2 id="heroTitle" class="text-3xl font-black leading-none mb-4 uppercase italic tracking-tighter">¿BUSCAS <br>TRABAJO?</h2>
                    <div id="heroBadge" class="inline-flex items-center gap-2 bg-black text-white px-5 py-2.5 rounded-full text-[10px] font-black uppercase tracking-widest">
                        Marketplace <i class="fa-solid fa-arrow-right"></i>
                    </div>
                </div>
                <i id="heroIcon" class="fa-solid fa-briefcase absolute -right-4 -bottom-4 text-8xl text-black/10 rotate-12"></i>
            </div>
        </main>

        <div class="tab-bar-wrapper">
            <nav class="tab-bar">
                <div class="tab-item active" onclick="location.href='index.html'">
                    <i class="fa-solid fa-house text-xl"></i>
                    <span class="text-[8px] font-black uppercase italic mt-1">Inicio</span>
                </div>
                
                <div id="dynamicNavBtn" class="tab-item">
                    </div>

                <div class="relative flex justify-center items-center">
                    <div id="centerButton" class="plus-button">
                        </div>
                </div>

                <div class="tab-item" onclick="location.href='mensajes.html'">
                    <i class="fa-solid fa-comment text-xl"></i>
                    <span class="text-[8px] font-black uppercase italic mt-1">Chat</span>
                </div>

                <div class="tab-item" onclick="location.href='perfil.html'">
                    <i class="fa-solid fa-user text-xl"></i>
                    <span class="text-[8px] font-black uppercase italic mt-1">Perfil</span>
                </div>
            </nav>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://thjzjwyosyxsgjfcignp.supabase.co', 'sb_publishable_ugM18BI_W0G-pu-mY-0a7g_omiUa7rT');

        async function initApp() {
            const phone = localStorage.getItem('userPhone');
            if (!phone) return setupVisitor();

            const { data: user, error } = await _supabase.from('users').select('*').eq('phone', phone).maybeSingle();
            if (error || !user) return setupVisitor();

            const role = (user.role || 'client').toLowerCase();
            if (role === 'pro' || role === 'jobber') {
                setupPro(user);
            } else {
                setupClient(user);
            }
        }

        async function setupPro(user) {
            document.getElementById('proUI').classList.remove('hidden');
            document.getElementById('realBalance').innerText = `$${(user.balance || 0).toFixed(2)}`;
            document.getElementById('pendingCommission').innerText = `$${(user.commission_due || 0).toFixed(2)}`;
            document.getElementById('paidCommission').innerText = `$${(user.commission_paid || 0).toFixed(2)}`;

            const { count } = await _supabase.from('jobs').select('*', { count: 'exact', head: true }).eq('worker_phone', user.phone).eq('status', 'completed');
            document.getElementById('realJobsCount').innerText = count || 0;

            // Alignement parfait pour Market
            document.getElementById('dynamicNavBtn').innerHTML = `
                <div onclick="location.href='marketplace.html'" class="flex flex-col items-center justify-center w-full">
                    <i class="fa-solid fa-briefcase text-xl"></i>
                    <span class="text-[8px] font-black italic uppercase mt-1">Market</span>
                </div>`;
            
            document.getElementById('centerButton').innerHTML = '<i class="fa-solid fa-list-check"></i>';
            document.getElementById('centerButton').onclick = () => location.href = 'mis-trabajos-pro.html';
            
            // Update Banner for Pro
            document.getElementById('heroTitle').innerHTML = 'CHAMBAS <br>DISPONIBLES';
            document.getElementById('heroBanner').onclick = () => location.href = 'marketplace.html';
        }

        function setupClient(user) {
            document.getElementById('clientUI').classList.remove('hidden');
            
            // Alignement parfait pour Mis Chambas
            document.getElementById('dynamicNavBtn').innerHTML = `
                <div onclick="location.href='mis-chambas.html'" class="flex flex-col items-center justify-center w-full">
                    <i class="fa-solid fa-receipt text-xl"></i>
                    <span class="text-[8px] font-black italic uppercase mt-1">Chambas</span>
                </div>`;
            
            document.getElementById('centerButton').innerHTML = '<i class="fa-solid fa-plus text-black"></i>';
            document.getElementById('centerButton').onclick = () => location.href = 'solicitar.html';
        }

        function setupVisitor() {
            document.getElementById('dynamicNavBtn').innerHTML = `
                <div onclick="location.href='categorias.html'" class="flex flex-col items-center justify-center w-full">
                    <i class="fa-solid fa-compass text-xl"></i>
                    <span class="text-[8px] font-black italic uppercase mt-1">Explorar</span>
                </div>`;
            
            document.getElementById('centerButton').innerHTML = '<i class="fa-solid fa-plus text-black"></i>';
            document.getElementById('centerButton').onclick = () => location.href = 'login.html';
        }

        function payCommission() {
            alert("Redirigiendo a pasarela de pago...");
            // window.location.href = 'pagar-comision.html';
        }

        window.onload = initApp;
    </script>
</body>
</html>
