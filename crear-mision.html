<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CHAMBA GO | Nueva Misión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --main-orange: #f97316; }
        body { background-color: #020617; font-family: 'Plus Jakarta Sans', sans-serif; color: white; margin: 0; }
        .glass-input { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 15px; width: 100%; color: white; outline: none; }
        .glass-input:focus { border-color: var(--main-orange); background: rgba(255,255,255,0.05); }
    </style>
</head>
<body class="h-full">

    <div class="max-w-[450px] mx-auto p-6 pb-32">
        <header class="flex items-center gap-4 mb-8 pt-4">
            <button onclick="window.history.back()" class="w-10 h-10 bg-white/5 border border-white/10 rounded-xl flex items-center justify-center">
                <i class="fa-solid fa-arrow-left text-xs"></i>
            </button>
            <h1 class="text-xl font-black uppercase italic italic tracking-tighter">SOLICITAR <span class="text-orange-500">SERVICIO</span></h1>
        </header>

        <div id="targetProInfo" class="mb-8 p-4 bg-orange-500/10 border border-orange-500/20 rounded-3xl flex items-center gap-4 hidden">
            <img id="targetAvatar" src="" class="w-12 h-12 rounded-xl object-cover">
            <div>
                <p class="text-[10px] font-black text-orange-500 uppercase tracking-widest">Solicitud directa para:</p>
                <p id="targetName" class="font-black italic uppercase text-white">---</p>
            </div>
        </div>

        <form id="missionForm" class="space-y-6">
            <div>
                <label class="text-[10px] font-black uppercase text-slate-500 ml-2 mb-2 block italic">¿Qué necesitas?</label>
                <input type="text" id="title" class="glass-input" placeholder="Ej: Reparar fuga de agua" required>
            </div>

            <div>
                <label class="text-[10px] font-black uppercase text-slate-500 ml-2 mb-2 block italic">Detalles del trabajo</label>
                <textarea id="description" rows="4" class="glass-input" placeholder="Describe brevemente lo que necesitas..." required></textarea>
            </div>

            <div>
                <label class="text-[10px] font-black uppercase text-slate-500 ml-2 mb-2 block italic">Presupuesto estimado (opcional)</label>
                <input type="number" id="budget" class="glass-input" placeholder="$0.00">
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-orange-500 text-black py-5 rounded-[2rem] font-black uppercase text-xs shadow-lg shadow-orange-500/20 active:scale-95 transition-all mt-4">
                <i class="fa-solid fa-paper-plane mr-2"></i> Enviar Solicitud
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _supabase = supabase.createClient('https://thjzjwyosyxsgjfcignp.supabase.co', 'sb_publishable_ugM18BI_W0G-pu-mY-0a7g_omiUa7rT');
        
        const urlParams = new URLSearchParams(window.location.search);
        const targetProId = urlParams.get('proId');

        async function initPage() {
            if (targetProId) {
                // Charger les infos du pro pour rassurer le client
                const { data: pro } = await _supabase.from('users').select('name, foto').eq('id', targetProId).single();
                if (pro) {
                    document.getElementById('targetProInfo').classList.remove('hidden');
                    document.getElementById('targetName').innerText = pro.name;
                    document.getElementById('targetAvatar').src = pro.foto ? (pro.foto.startsWith('http') ? pro.foto : `https://thjzjwyosyxsgjfcignp.supabase.co/storage/v1/object/public/avatars/${pro.foto}`) : `https://ui-avatars.com/api/?name=${pro.name}`;
                }
            }
        }

        document.getElementById('missionForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "Enviando...";

            const myId = localStorage.getItem('userId'); // Ton ID client

            const { error } = await _supabase.from('jobs').insert([{
                client_id: myId,
                pro_id: targetProId, // SI C'EST VIDE, C'EST POUR LE MARKETPLACE. SI REMPLI, C'EST DIRECT.
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                budget: document.getElementById('budget').value,
                status: 'pending',
                created_at: new Date()
            }]);

            if (error) {
                alert("Error: " + error.message);
                btn.disabled = false;
                btn.innerText = "Enviar Solicitud";
            } else {
                alert("¡Solicitud enviada! El profesional te contactará una vez que acepte.");
                window.location.href = 'index.html';
            }
        };

        window.onload = initPage;
    </script>
</body>
</html>
