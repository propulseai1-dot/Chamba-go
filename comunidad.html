<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CHAMBA GO | Comunidad</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --main-orange: #f97316; }

        body { background-color: #020617; font-family: 'Plus Jakarta Sans', sans-serif; color: white; margin: 0; }

        .app-container {
            width: 100%; max-width: 450px; margin: 0 auto;
            position: relative; min-height: 100vh;
            display: flex; flex-direction: column; background: #020617;
        }

        /* --- NAVIGATION (CLONE EXACT) --- */
        .tab-bar-wrapper { 
            position: fixed; bottom: 15px; width: 100%; max-width: 450px; 
            padding: 0 15px; z-index: 1000; left: 50%; transform: translateX(-50%);
        }
        .tab-bar { 
            width: 100%; height: 75px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 25px; 
            display: grid; grid-template-columns: repeat(5, 1fr); 
            align-items: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .tab-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #64748b; cursor: pointer; }
        .tab-item.active { color: var(--main-orange); }

        .plus-button {
            position: absolute; top: -28px; left: 50%; transform: translateX(-50%);
            width: 58px; height: 58px; background: var(--main-orange); border-radius: 20px;
            display: flex; align-items: center; justify-content: center; 
            color: #000; font-size: 22px; border: 5px solid #020617;
            box-shadow: 0 10px 20px rgba(249, 115, 22, 0.3); z-index: 1100;
        }

        /* --- DESIGN DES CARTES PRO --- */
        .pro-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 28px;
            transition: transform 0.2s;
        }
        .pro-card:active { transform: scale(0.98); }
        
        .status-badge {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            padding: 4px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .avatar-container {
            position: relative;
            width: 70px; height: 70px;
        }
        .avatar-img {
            width: 100%; height: 100%;
            border-radius: 22px;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.1);
        }
        .verify-check {
            position: absolute; bottom: -5px; right: -5px;
            background: #3b82f6; color: white;
            width: 20px; height: 20px;
            border-radius: 50%; border: 3px solid #0f172a;
            display: flex; align-items: center; justify-content: center;
            font-size: 8px;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .hero-mesh { background-image: radial-gradient(at 0% 0%, rgba(249, 115, 22, 0.1) 0, transparent 50%), radial-gradient(at 100% 0%, rgba(249, 115, 22, 0.05) 0, transparent 50%); }
    </style>
</head>
<body class="h-full bg-black">

    <div class="app-container hero-mesh">
        <header class="px-6 pt-12 pb-6 flex items-center justify-between sticky top-0 z-50 backdrop-blur-md bg-slate-950/50">
            <div class="flex items-center gap-4">
                <div onclick="window.history.back()" class="w-10 h-10 bg-white/5 border border-white/10 rounded-xl flex items-center justify-center cursor-pointer">
                    <i class="fa-solid fa-arrow-left text-xs text-white"></i>
                </div>
                <h1 class="text-2xl font-black italic tracking-tighter uppercase text-white">PROS <span class="text-orange-500">CERCA</span></h1>
            </div>
            <div class="w-10 h-10 bg-orange-500/10 border border-orange-500/20 rounded-xl flex items-center justify-center">
                <i class="fa-solid fa-sliders text-orange-500 text-xs"></i>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto px-6 pb-44 no-scrollbar">
            <div class="flex gap-2 overflow-x-auto no-scrollbar py-2 mb-4">
                <span class="bg-orange-500 text-black px-4 py-2 rounded-full text-xs font-black uppercase italic italic">Todos</span>
                <span class="bg-white/5 border border-white/10 px-4 py-2 rounded-full text-xs font-black uppercase italic">Fontaneros</span>
                <span class="bg-white/5 border border-white/10 px-4 py-2 rounded-full text-xs font-black uppercase italic">Limpieza</span>
                <span class="bg-white/5 border border-white/10 px-4 py-2 rounded-full text-xs font-black uppercase italic">Electricistas</span>
            </div>

            <div class="space-y-4">
                
                <div class="pro-card p-5 flex items-center gap-4">
                    <div class="avatar-container">
                        <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=200" class="avatar-img" alt="Pro">
                        <div class="verify-check"><i class="fa-solid fa-check"></i></div>
                    </div>
                    <div class="flex-1">
                        <div class="flex justify-between items-start">
                            <h3 class="font-black uppercase italic text-white text-base">Carlos Ruiz</h3>
                            <span class="status-badge">Disponible</span>
                        </div>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-2">Plomero Profesional</p>
                        <div class="flex items-center gap-3">
                            <div class="flex items-center text-orange-500 text-[10px]">
                                <i class="fa-solid fa-star"></i>
                                <span class="ml-1 font-black">4.9</span>
                                <span class="text-slate-500 ml-1">(124)</span>
                            </div>
                            <div class="flex items-center text-slate-500 text-[10px] font-bold">
                                <i class="fa-solid fa-location-dot"></i>
                                <span class="ml-1 uppercase">2.5 km</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="pro-card p-5 flex items-center gap-4">
                    <div class="avatar-container">
                        <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=200" class="avatar-img" alt="Pro">
                        <div class="verify-check"><i class="fa-solid fa-check"></i></div>
                    </div>
                    <div class="flex-1">
                        <div class="flex justify-between items-start">
                            <h3 class="font-black uppercase italic text-white text-base">Ana Mendez</h3>
                            <span class="status-badge">Disponible</span>
                        </div>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-2">Especialista en Limpieza</p>
                        <div class="flex items-center gap-3">
                            <div class="flex items-center text-orange-500 text-[10px]">
                                <i class="fa-solid fa-star"></i>
                                <span class="ml-1 font-black">5.0</span>
                                <span class="text-slate-500 ml-1">(89)</span>
                            </div>
                            <div class="flex items-center text-slate-500 text-[10px] font-bold">
                                <i class="fa-solid fa-location-dot"></i>
                                <span class="ml-1 uppercase">0.8 km</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="pro-card p-5 flex items-center gap-4">
                    <div class="avatar-container">
                        <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=200" class="avatar-img" alt="Pro">
                        <div class="verify-check"><i class="fa-solid fa-check"></i></div>
                    </div>
                    <div class="flex-1">
                        <div class="flex justify-between items-start">
                            <h3 class="font-black uppercase italic text-white text-base">Julio Sosa</h3>
                            <span class="status-badge">Disponible</span>
                        </div>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-2">Electricista Técnico</p>
                        <div class="flex items-center gap-3">
                            <div class="flex items-center text-orange-500 text-[10px]">
                                <i class="fa-solid fa-star"></i>
                                <span class="ml-1 font-black">4.7</span>
                                <span class="text-slate-500 ml-1">(56)</span>
                            </div>
                            <div class="flex items-center text-slate-500 text-[10px] font-bold">
                                <i class="fa-solid fa-location-dot"></i>
                                <span class="ml-1 uppercase">5.1 km</span>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </main>

        <div class="tab-bar-wrapper">
            <nav class="tab-bar">
                <div class="tab-item" onclick="window.location.href='index.html'">
                    <i class="fa-solid fa-house text-xl"></i>
                    <span class="text-[8px] font-black uppercase italic mt-1">Inicio</span>
                </div>
                <div id="dynamicNavBtn" class="tab-item"></div>
                <div class="relative flex justify-center items-center">
                    <div id="centerButton" class="plus-button">
                        <i class="fa-solid fa-plus text-black"></i>
                    </div>
                </div>
                <div class="tab-item" onclick="window.location.href='mensajes.html'">
                    <i class="fa-solid fa-comment text-xl"></i>
                    <span class="text-[8px] font-black uppercase italic mt-1">Chat</span>
                </div>
                <div class="tab-item active" onclick="window.location.href='comunidad.html'">
                    <i class="fa-solid fa-users text-xl"></i>
                    <span class="text-[8px] font-black uppercase italic mt-1">Pros</span>
                </div>
            </nav>
        </div>
    </div>

    <script>
        function updateNavigation() {
            const dynamicBtn = document.getElementById('dynamicNavBtn');
            const centerBtn = document.getElementById('centerButton');
            const isPro = localStorage.getItem('userRole') === 'pro';

            if (isPro) {
                dynamicBtn.onclick = () => window.location.href='marketplace.html';
                dynamicBtn.innerHTML = '<i class="fa-solid fa-briefcase text-xl"></i><span class="text-[8px] font-black uppercase italic mt-1">Chambas</span>';
                centerBtn.onclick = () => window.location.href='mis-trabajos-pro.html';
            } else {
                dynamicBtn.onclick = () => window.location.href='categorias.html';
                dynamicBtn.innerHTML = '<i class="fa-solid fa-compass text-xl"></i><span class="text-[8px] font-black uppercase italic mt-1">Explorar</span>';
                centerBtn.onclick = () => window.location.href='solicitar.html';
            }
        }
        window.onload = updateNavigation;
    </script>
</body>
</html>
