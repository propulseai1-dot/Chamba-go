<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CHAMBA GO | Comunidad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --main-orange: #f97316; }
        body { background-color: #020617; font-family: 'Plus Jakarta Sans', sans-serif; color: white; margin: 0; }
        .app-container { width: 100%; max-width: 450px; margin: 0 auto; position: relative; min-height: 100vh; display: flex; flex-direction: column; background: #020617; }
        .tab-bar-wrapper { position: fixed; bottom: 15px; width: 100%; max-width: 450px; padding: 0 15px; z-index: 1000; left: 50%; transform: translateX(-50%); }
        .tab-bar { width: 100%; height: 75px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 25px; display: grid; grid-template-columns: repeat(5, 1fr); align-items: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .tab-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #64748b; cursor: pointer; }
        .tab-item.active { color: var(--main-orange); }
        .plus-button { position: absolute; top: -28px; left: 50%; transform: translateX(-50%); width: 58px; height: 58px; background: var(--main-orange); border-radius: 20px; display: flex; align-items: center; justify-content: center; color: #000; font-size: 22px; border: 5px solid #020617; box-shadow: 0 10px 20px rgba(249, 115, 22, 0.3); z-index: 1100; }
        .pro-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 28px; transition: all 0.2s; }
        .avatar-img { width: 70px; height: 70px; border-radius: 22px; object-fit: cover; border: 2px solid rgba(255,255,255,0.1); background: #1e293b; }
        .verify-check { position: absolute; bottom: -5px; right: -5px; background: #3b82f6; color: white; width: 20px; height: 20px; border-radius: 50%; border: 3px solid #0f172a; display: flex; align-items: center; justify-content: center; font-size: 8px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-full bg-black">
    <div class="app-container">
        <header class="px-6 pt-12 pb-6 flex items-center justify-between sticky top-0 z-50 backdrop-blur-md bg-slate-950/50">
            <h1 class="text-2xl font-black italic tracking-tighter uppercase text-white">PROS <span class="text-orange-500">CERCA</span></h1>
        </header>

        <main class="flex-1 overflow-y-auto px-6 pb-44 no-scrollbar">
            <div id="prosContainer" class="space-y-4 mt-4"></div>
        </main>

        <div class="tab-bar-wrapper">
            <nav class="tab-bar">
                <div class="tab-item" onclick="window.location.href='index.html'"><i class="fa-solid fa-house text-xl"></i><span class="text-[8px] font-black uppercase italic mt-1">Inicio</span></div>
                <div id="dynamicNavBtn" class="tab-item"></div>
                <div class="relative flex justify-center items-center"><div id="centerButton" class="plus-button"><i class="fa-solid fa-plus text-black"></i></div></div>
                <div class="tab-item" onclick="window.location.href='mensajes.html'"><i class="fa-solid fa-comment text-xl"></i><span class="text-[8px] font-black uppercase italic mt-1">Chat</span></div>
                <div class="tab-item active" onclick="window.location.href='comunidad.html'"><i class="fa-solid fa-users text-xl"></i><span class="text-[8px] font-black uppercase italic mt-1">Pros</span></div>
            </nav>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _supabase = supabase.createClient('https://thjzjwyosyxsgjfcignp.supabase.co', 'sb_publishable_ugM18BI_W0G-pu-mY-0a7g_omiUa7rT');

        async function fetchPros() {
            const container = document.getElementById('prosContainer');
            try {
                const { data: pros, error } = await _supabase.from('users').select('*').eq('role', 'jobber');
                if (error) throw error;
                container.innerHTML = '';

                pros.forEach(pro => {
                    let finalImg = "";
                    if (pro.foto) {
                        finalImg = pro.foto.startsWith('http') 
                            ? pro.foto 
                            : `https://thjzjwyosyxsgjfcignp.supabase.co/storage/v1/object/public/avatars/${pro.foto}`;
                    } else {
                        finalImg = `https://ui-avatars.com/api/?name=${encodeURIComponent(pro.name)}&background=f97316&color=000&bold=true`;
                    }

                    container.innerHTML += `
                        <div class="pro-card p-5 flex items-center gap-4" onclick="window.location.href='perfil-pro.html?id=${pro.id}'">
                            <div class="relative">
                                <img src="${finalImg}" class="avatar-img" onerror="this.src='https://ui-avatars.com/api/?name=User&background=334155&color=fff'">
                                <div class="verify-check"><i class="fa-solid fa-check"></i></div>
                            </div>
                            <div class="flex-1">
                                <div class="flex justify-between items-start">
                                    <h3 class="font-black uppercase italic text-white text-base">${pro.name}</h3>
                                    <span class="text-[9px] bg-green-500/10 text-green-500 px-2 py-0.5 rounded-full font-black uppercase italic">En línea</span>
                                </div>
                                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-2">Especialista</p>
                                <div class="flex items-center gap-3">
                                    <div class="flex items-center text-orange-500 text-[10px] font-black"><i class="fa-solid fa-star mr-1"></i>5.0</div>
                                    <div class="text-slate-500 text-[10px] font-bold uppercase tracking-widest italic">Ver perfil</div>
                                </div>
                            </div>
                        </div>`;
                });
            } catch (err) {
                console.error(err);
                container.innerHTML = '<p class="text-center text-red-500 text-[10px] uppercase py-10">Error de conexión</p>';
            }
        }

        function updateNavigation() {
            const dynamicBtn = document.getElementById('dynamicNavBtn');
            const centerBtn = document.getElementById('centerButton');
            const isPro = localStorage.getItem('userRole') === 'pro';
            if (isPro) {
                dynamicBtn.innerHTML = '<i class="fa-solid fa-briefcase text-xl"></i><span class="text-[8px] font-black uppercase italic mt-1">Chambas</span>';
                dynamicBtn.onclick = () => window.location.href='marketplace.html';
                centerBtn.onclick = () => window.location.href='mis-trabajos-pro.html';
            } else {
                dynamicBtn.innerHTML = '<i class="fa-solid fa-compass text-xl"></i><span class="text-[8px] font-black uppercase italic mt-1">Explorar</span>';
                dynamicBtn.onclick = () => window.location.href='categorias.html';
                centerBtn.onclick = () => window.location.href='crear-mision.html';
            }
        }

        window.onload = () => { updateNavigation(); fetchPros(); };
    </script>
</body>
</html>
