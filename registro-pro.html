<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CHAMBA GO | Registro PRO</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --main-orange: #f97316; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; margin: 0; }
        .hero-mesh { background-image: radial-gradient(at 0% 0%, rgba(249, 115, 22, 0.1) 0, transparent 50%); }
        
        .input-glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 1.25rem; width: 100%; padding: 1rem 1.25rem; outline: none; transition: all 0.3s; }
        .input-glass:focus { border-color: var(--main-orange); background: rgba(249, 115, 22, 0.05); }
        
        /* Style pour le conteneur du téléphone avec préfixe solide */
        .phone-container { position: relative; display: flex; align-items: center; }
        .prefix { position: absolute; left: 1.25rem; font-weight: 800; color: var(--main-orange); font-style: italic; font-size: 10px; pointer-events: none; }
        .phone-input { padding-left: 3.5rem !important; }

        .upload-card { border: 2px dashed rgba(255,255,255,0.1); border-radius: 1.5rem; transition: all 0.3s; cursor: pointer; position: relative; overflow: hidden; }
        .upload-card.active { border-color: var(--main-orange); background: rgba(249, 115, 22, 0.05); }
        .preview-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; }

        .tab-bar-wrapper { position: fixed; bottom: 15px; width: 100%; max-width: 450px; padding: 0 15px; z-index: 1000; left: 50%; transform: translateX(-50%); }
        .tab-bar { width: 100%; height: 75px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 25px; display: grid; grid-template-columns: repeat(5, 1fr); align-items: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .tab-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #64748b; cursor: pointer; transition: all 0.3s; width: 100%; }
        .tab-item.active { color: var(--main-orange); }
        .plus-button { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); width: 60px; height: 60px; background: var(--main-orange); border-radius: 20px; display: flex; align-items: center; justify-content: center; color: #000; font-size: 24px; border: 6px solid #020617; box-shadow: 0 10px 20px rgba(249, 115, 22, 0.3); transition: transform 0.2s; }
    </style>
</head>
<body class="h-full hero-mesh">

    <div class="max-w-[450px] mx-auto px-6 pt-12 pb-32">
        <header class="mb-10">
            <button onclick="location.href='index.html'" class="w-10 h-10 bg-white/5 border border-white/10 rounded-xl flex items-center justify-center mb-6 active:scale-90 transition-transform">
                <i class="fa-solid fa-arrow-left text-xs"></i>
            </button>
            <h1 class="text-4xl font-black italic tracking-tighter uppercase leading-none">ÚNETE COMO <br><span class="text-orange-500">PRO</span></h1>
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-2">Verificación de identidad necesaria</p>
        </header>

        <form id="proRegisterForm" class="space-y-6">
            <div class="space-y-4">
                <input type="text" id="fullName" placeholder="NOMBRE COMPLETO" class="input-glass text-[10px] font-black tracking-widest uppercase" required>
                
                <div class="phone-container">
                    <span class="prefix">+52</span>
                    <input type="tel" id="phone" placeholder="TELÉFONO (WhatsApp)" 
                           maxlength="10"
                           class="input-glass phone-input text-[10px] font-black tracking-widest uppercase" required>
                </div>
            </div>

            <hr class="border-white/5 my-8">

            <div class="space-y-4">
                <p class="text-[9px] font-black text-orange-500 uppercase tracking-[0.2em]">Paso 1: Foto de Identidad (DNI/Cedula)</p>
                <div onclick="document.getElementById('fileId').click()" class="upload-card p-8 flex flex-col items-center justify-center gap-3" id="dropId">
                    <img id="previewId" class="preview-img">
                    <i class="fa-solid fa-address-card text-3xl text-white/20"></i>
                    <p class="text-[8px] font-black text-slate-500 uppercase">Click para subir foto frontal</p>
                    <input type="file" id="fileId" class="hidden" accept="image/*" onchange="handlePreview(this, 'previewId', 'dropId')">
                </div>

                <p class="text-[9px] font-black text-orange-500 uppercase tracking-[0.2em] pt-4">Paso 2: Selfie de Verificación</p>
                <div onclick="document.getElementById('fileSelfie').click()" class="upload-card p-8 flex flex-col items-center justify-center gap-3" id="dropSelfie">
                    <img id="previewSelfie" class="preview-img">
                    <i class="fa-solid fa-camera text-3xl text-white/20"></i>
                    <p class="text-[8px] font-black text-slate-500 uppercase">Sujeta tu ID junto a tu rostro</p>
                    <input type="file" id="fileSelfie" class="hidden" accept="image/*" onchange="handlePreview(this, 'previewSelfie', 'dropSelfie')">
                </div>
            </div>

            <button type="submit" class="w-full bg-orange-500 text-black font-black py-5 rounded-[1.5rem] uppercase text-xs tracking-[0.2em] shadow-xl shadow-orange-500/20 active:scale-95 transition-all mt-8">
                Enviar Solicitud
            </button>
        </form>
    </div>

    <div class="tab-bar-wrapper">
        <nav class="tab-bar">
            <div class="tab-item" onclick="location.href='index.html'">
                <i class="fa-solid fa-house text-xl"></i>
                <span class="text-[8px] font-black uppercase italic mt-1">Inicio</span>
            </div>
            <div class="tab-item" onclick="location.href='categorias.html'">
                <i class="fa-solid fa-compass text-xl"></i>
                <span class="text-[8px] font-black italic uppercase mt-1">Explorar</span>
            </div>
            <div class="relative flex justify-center items-center">
                <div onclick="location.href='login.html'" class="plus-button">
                    <i class="fa-solid fa-plus text-black"></i>
                </div>
            </div>
            <div class="tab-item" onclick="location.href='mensajes.html'">
                <i class="fa-solid fa-comment text-xl"></i>
                <span class="text-[8px] font-black uppercase italic mt-1">Chat</span>
            </div>
            <div class="tab-item" onclick="location.href='perfil.html'">
                <i class="fa-solid fa-user text-xl"></i>
                <span class="text-[8px] font-black uppercase italic mt-1">Perfil</span>
            </div>
        </nav>
    </div>

    <script>
        const _supabase = supabase.createClient('https://thjzjwyosyxsgjfcignp.supabase.co', 'sb_publishable_ugM18BI_W0G-pu-mY-0a7g_omiUa7rT');

        function handlePreview(input, previewId, dropId) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.getElementById(previewId);
                    img.src = e.target.result;
                    img.style.display = 'block';
                    document.getElementById(dropId).classList.add('active');
                }
                reader.readAsDataURL(file);
            }
        }

        document.getElementById('proRegisterForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = 'PROCESANDO...';
            btn.disabled = true;

            const fullName = document.getElementById('fullName').value;
            // On concatène le préfixe +52 avec le numéro saisi
            const phone = "+52" + document.getElementById('phone').value;
            
            const { error } = await _supabase.from('users').upsert({
                phone: phone,
                full_name: fullName,
                role: 'pro',
                status: 'pending_verification'
            });

            if (error) {
                alert("Error al registrar: " + error.message);
                btn.innerText = 'ENVIAR SOLICITUD';
                btn.disabled = false;
            } else {
                localStorage.setItem('userPhone', phone);
                alert("¡Solicitud enviada! Verificaremos tus documentos en menos de 24h.");
                location.href = 'index.html';
            }
        };
    </script>
</body>
</html>
