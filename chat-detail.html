<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chat | CHAMBA GO</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --main-orange: #f97316; --bg-dark: #020617; }
        
        .app-container {
            width: 100%; max-width: 450px; margin: 0 auto;
            position: relative; height: 100vh;
            display: flex; flex-direction: column; background: #020617;
        }

        .chat-messages {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 12px;
        }

        /* BULLES DE MESSAGE */
        .bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 13px; line-height: 1.5; font-weight: 500; }
        .bubble-me { align-self: flex-end; background: var(--main-orange); color: #000; border-bottom-right-radius: 4px; }
        .bubble-them { align-self: flex-start; background: rgba(255,255,255,0.05); color: #fff; border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }

        /* INPUT AREA */
        .input-wrapper {
            padding: 20px; background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.05);
        }

        .chat-input {
            width: 100%; bg-white/5; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px; padding: 14px 50px 14px 18px;
            color: white; outline: none; transition: 0.3s; font-size: 13px;
        }
        .chat-input:focus { border-color: var(--main-orange); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .hero-mesh { background-image: radial-gradient(at 0% 0%, rgba(249, 115, 22, 0.05) 0, transparent 50%); }
    </style>
</head>
<body class="h-full bg-black">

    <div class="app-container hero-mesh">

        <header class="px-6 py-10 flex items-center justify-between sticky top-0 z-50 backdrop-blur-lg bg-slate-950/80 border-bottom border-white/5">
            <div class="flex items-center gap-4">
                <div onclick="history.back()" class="w-10 h-10 bg-white/5 border border-white/10 rounded-xl flex items-center justify-center cursor-pointer active:scale-90">
                    <i class="fa-solid fa-chevron-left text-xs text-white"></i>
                </div>
                <div class="flex items-center gap-3">
                    <div class="relative">
                        <img id="proAvatar" src="https://via.placeholder.com/150" class="w-10 h-10 rounded-full object-cover border border-orange-500/30">
                        <span class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-green-500 border-2 border-[#020617] rounded-full"></span>
                    </div>
                    <div>
                        <h2 id="proName" class="text-sm font-black text-white uppercase italic tracking-tighter">Cargando...</h2>
                        <span class="text-[9px] font-bold text-orange-500 uppercase tracking-widest">En línea</span>
                    </div>
                </div>
            </div>
            <div class="flex gap-4 text-white/50">
                <i class="fa-solid fa-phone text-sm cursor-pointer hover:text-orange-500"></i>
                <i class="fa-solid fa-video text-sm cursor-pointer hover:text-orange-500"></i>
            </div>
        </header>

        <main class="chat-messages no-scrollbar" id="chatContainer">
            <div class="bubble bubble-them">
                ¡Hola! Vi tu solicitud para la chamba de plomería en Tulum Centro.
            </div>
            <div class="bubble bubble-them">
                ¿Podrías enviarme una foto del problema para darte un presupuesto?
            </div>
            <div class="bubble bubble-me">
                ¡Hola! Claro, te la mando ahora mismo. Es una fuga en el fregadero.
            </div>
        </main>

        <div class="input-wrapper">
            <div class="relative">
                <input type="text" id="messageInput" placeholder="Escribe un mensaje..." class="chat-input bg-white/5">
                <button onclick="sendMessage()" class="absolute right-3 top-1/2 -translate-y-1/2 w-9 h-9 bg-orange-500 rounded-xl flex items-center justify-center active:scale-90 transition-all">
                    <i class="fa-solid fa-paper-plane text-black text-xs"></i>
                </button>
            </div>
            <div class="flex justify-between mt-4 px-2 opacity-50">
                <i class="fa-solid fa-camera text-white cursor-pointer hover:text-orange-500"></i>
                <i class="fa-solid fa-microphone text-white cursor-pointer hover:text-orange-500"></i>
                <i class="fa-solid fa-image text-white cursor-pointer hover:text-orange-500"></i>
                <i class="fa-solid fa-location-dot text-white cursor-pointer hover:text-orange-500"></i>
            </div>
        </div>

    </div>

    <script>
        // Récupération des infos du pro via l'URL (simulé)
        const urlParams = new URLSearchParams(window.location.search);
        const proId = urlParams.get('id');

        // On réutilise la logique des noms pour l'affichage
        const prosData = {
            '101': { name: 'Juan Hernández', img: 'https://images.unsplash.com/photo-1590086782792-42dd2350140d?q=80&w=250&h=250&fit=crop' },
            '102': { name: 'María Flores', img: 'https://images.unsplash.com/photo-1544005313-94ddf0286df2?q=80&w=250&h=250&fit=crop' },
            'default': { name: 'Pro Cercano', img: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?q=80&w=250&h=250&fit=crop' }
        };

        const currentPro = prosData[proId] || prosData['default'];
        document.getElementById('proName').innerText = currentPro.name;
        document.getElementById('proAvatar').src = currentPro.img;

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const container = document.getElementById('chatContainer');

            if (input.value.trim() !== "") {
                const msg = document.createElement('div');
                msg.className = 'bubble bubble-me fade-in';
                msg.innerText = input.value;
                container.appendChild(msg);
                
                input.value = "";
                container.scrollTop = container.scrollHeight;
            }
        }

        // Envoyer avec "Entrée"
        document.getElementById('messageInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
