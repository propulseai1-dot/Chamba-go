<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CHAMBA GO | Editar Perfil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --main-orange: #f97316; }
        body { background-color: #020617; font-family: 'Plus Jakarta Sans', sans-serif; color: white; margin: 0; }
        
        .input-field {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 1.25rem;
            padding: 1rem 1.25rem;
            width: 100%;
            color: white;
            font-size: 0.875rem;
            transition: all 0.3s;
        }
        .input-field:focus {
            outline: none;
            border-color: var(--main-orange);
            background: rgba(249, 115, 22, 0.05);
        }
        
        .save-btn {
            background: var(--main-orange);
            color: black;
            font-weight: 900;
            text-transform: uppercase;
            font-style: italic;
            border-radius: 1.25rem;
            padding: 1.25rem;
            width: 100%;
            box-shadow: 0 10px 20px rgba(249, 115, 22, 0.2);
            transition: all 0.3s;
        }
        .save-btn:active { transform: scale(0.95); }

        .section-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 2rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body class="h-full">

    <div class="max-w-[450px] mx-auto min-h-screen flex flex-col pb-10">
        
        <header class="px-6 pt-12 pb-6 flex items-center gap-4 sticky top-0 bg-slate-950/80 backdrop-blur-md z-50">
            <button onclick="history.back()" class="w-10 h-10 bg-white/5 rounded-xl border border-white/10 flex items-center justify-center">
                <i class="fa-solid fa-chevron-left text-sm"></i>
            </button>
            <h1 id="pageTitle" class="text-xl font-black italic uppercase tracking-tighter text-white">Editar <span class="text-orange-500">Perfil</span></h1>
        </header>

        <main class="px-6 mt-4">
            <div class="flex flex-col items-center mb-8">
                <div class="relative">
                    <img id="previewAvatar" src="https://ui-avatars.com/api/?background=0f172a&color=f97316&bold=true" class="w-28 h-28 rounded-[2.5rem] border-2 border-orange-500 p-1 object-cover">
                    <label class="absolute -bottom-1 -right-1 bg-white text-black w-9 h-9 rounded-full flex items-center justify-center border-4 border-[#020617] cursor-pointer">
                        <i class="fa-solid fa-pen text-[10px]"></i>
                        <input type="file" id="photoInput" class="hidden" accept="image/*" onchange="previewImage(this)">
                    </label>
                </div>
            </div>

            <div class="space-y-4">
                <div class="section-card">
                    <p class="text-[10px] font-black uppercase text-orange-500 mb-4 tracking-widest">Información Básica</p>
                    <div class="space-y-4">
                        <div>
                            <label class="text-[9px] font-bold text-slate-500 uppercase ml-2 mb-1 block">Nombre Público</label>
                            <input type="text" id="editName" class="input-field" placeholder="Tu nombre">
                        </div>
                    </div>
                </div>

                <div id="proFields" class="hidden space-y-4">
                    <div class="section-card">
                        <p class="text-[10px] font-black uppercase text-orange-500 mb-4 tracking-widest">Detalles Profesionales</p>
                        <div class="space-y-4">
                            <div>
                                <label class="text-[9px] font-bold text-slate-500 uppercase ml-2 mb-1 block">Especialidad</label>
                                <input type="text" id="editCategory" class="input-field" placeholder="Ej: Plomero, Chofer">
                            </div>
                            <div>
                                <label class="text-[9px] font-bold text-slate-500 uppercase ml-2 mb-1 block">Bio / Experiencia</label>
                                <textarea id="editBio" rows="3" class="input-field resize-none" placeholder="Describe tu trabajo..."></textarea>
                            </div>
                            <div>
                                <label class="text-[9px] font-bold text-slate-500 uppercase ml-2 mb-1 block">Precio Base ($)</label>
                                <input type="number" id="editPrice" class="input-field" placeholder="0.00">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-8">
                <button onclick="saveProfile()" id="saveBtn" class="save-btn">
                    Guardar Cambios
                </button>
            </div>
        </main>
    </div>

    <script>
        const _supabase = supabase.createClient('https://thjzjwyosyxsgjfcignp.supabase.co', 'sb_publishable_ugM18BI_W0G-pu-mY-0a7g_omiUa7rT');
        const phone = localStorage.getItem('userPhone');
        let userRole = '';

        async function loadCurrentData() {
            if (!phone) return;
            const { data: user } = await _supabase.from('users').select('*').eq('phone', phone).single();
            
            if (user) {
                userRole = user.role;
                document.getElementById('editName').value = user.name || '';
                
                // Si c'est un PRO, on montre les champs et on remplit les données
                if (userRole === 'pro' || userRole === 'jobber') {
                    document.getElementById('proFields').classList.remove('hidden');
                    document.getElementById('pageTitle').innerHTML = 'Editar <span class="text-orange-500">Perfil Pro</span>';
                    document.getElementById('editCategory').value = user.category || '';
                    document.getElementById('editBio').value = user.bio || '';
                    document.getElementById('editPrice').value = user.base_price || '';
                }

                if (user.foto) document.getElementById('previewAvatar').src = user.foto;
            }
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => document.getElementById('previewAvatar').src = e.target.result;
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function saveProfile() {
            const btn = document.getElementById('saveBtn');
            btn.innerText = "Guardando...";
            btn.disabled = true;

            const name = document.getElementById('editName').value;
            const fileInput = document.getElementById('photoInput');

            // Préparation de l'objet de mise à jour
            const updates = { name: name };

            // Si c'est un PRO, on ajoute les champs spécifiques
            if (userRole === 'pro' || userRole === 'jobber') {
                updates.category = document.getElementById('editCategory').value;
                updates.bio = document.getElementById('editBio').value;
                updates.base_price = document.getElementById('editPrice').value;
            }

            try {
                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    const path = `avatars/${phone}_${Date.now()}.png`;
                    await _supabase.storage.from('avatars').upload(path, file);
                    const { data } = _supabase.storage.from('avatars').getPublicUrl(path);
                    updates.foto = data.publicUrl;
                }

                const { error } = await _supabase.from('users').update(updates).eq('phone', phone);
                if (error) throw error;
                
                alert("¡Perfil actualizado!");
                window.location.href = 'perfil.html';

            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                btn.innerText = "Guardar Cambios";
                btn.disabled = false;
            }
        }

        window.onload = loadCurrentData;
    </script>
</body>
</html>
