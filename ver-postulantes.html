<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CHAMBA GO | Postulantes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --main-orange: #f97316; --bg-dark: #020617; }
        body { background-color: var(--bg-dark); font-family: 'Plus Jakarta Sans', sans-serif; color: white; margin: 0; }
        .app-shell { max-width: 450px; margin: 0 auto; min-height: 100vh; background: var(--bg-dark); position: relative; padding-bottom: 40px; }
        .pro-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 2rem; transition: all 0.2s; }
        .glass-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="h-full">

    <div class="app-shell p-6">
        
        <header class="py-6 flex items-center gap-4 mb-8">
            <button onclick="history.back()" class="w-12 h-12 flex items-center justify-center bg-white/5 rounded-2xl border border-white/10 active:scale-90 transition-all">
                <i class="fa-solid fa-chevron-left text-slate-400"></i>
            </button>
            <div>
                <h1 id="jobTitleHeader" class="text-lg font-black italic text-white uppercase tracking-tighter leading-none">POSTULANTES</h1>
                <p class="text-[9px] font-black text-orange-500 uppercase tracking-widest mt-1">Candidatos interesados</p>
            </div>
        </header>

        <div id="proList" class="space-y-4">
            <div class="py-20 text-center opacity-20">
                <i class="fa-solid fa-circle-notch animate-spin text-2xl text-orange-500"></i>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _supabase = supabase.createClient('https://thjzjwyosyxsgjfcignp.supabase.co', 'sb_publishable_ugM18BI_W0G-pu-mY-0a7g_omiUa7rT');

        async function loadPostulantes() {
            const urlParams = new URLSearchParams(window.location.search);
            const jobId = urlParams.get('id');
            const container = document.getElementById('proList');

            if (!jobId) { location.href = 'mis-pedidos.html'; return; }

            try {
                // 1. Récupérer les détails du job pour le titre
                const { data: job } = await _supabase.from('jobs').select('title').eq('id', jobId).single();
                if(job) document.getElementById('jobTitleHeader').innerText = job.title;

                // 2. Récupérer les postulants
                const { data: apps, error } = await _supabase
                    .from('applications')
                    .select('*')
                    .eq('job_id', jobId)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!apps || apps.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-20 bg-white/5 rounded-[2.5rem] border border-dashed border-white/10">
                            <p class="text-slate-500 uppercase text-[10px] font-black tracking-widest px-10">Aún no hay postulantes. ¡Aparecerán aquí pronto!</p>
                        </div>`;
                    return;
                }

                container.innerHTML = '';
                
                apps.forEach(app => {
                    container.innerHTML += `
                        <div class="pro-card p-5">
                            <div class="flex items-center justify-between mb-4">
                                <div class="flex items-center gap-4">
                                    <div class="w-12 h-12 bg-orange-500/20 rounded-2xl flex items-center justify-center border border-orange-500/30">
                                        <i class="fa-solid fa-user-tie text-orange-500"></i>
                                    </div>
                                    <div>
                                        <h3 class="font-black uppercase italic text-sm tracking-tight text-white">${app.pro_name}</h3>
                                        <div class="flex text-[8px] text-orange-500 mt-1">
                                            <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
                                            <span class="text-slate-500 ml-2">(4.9)</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <p class="text-[8px] font-black text-slate-500 uppercase tracking-widest">Verificado</p>
                                    <i class="fa-solid fa-circle-check text-blue-500 text-xs mt-1"></i>
                                </div>
                            </div>
                            
                            <div class="flex gap-2">
                                <button onclick="alert('Próximamente: Chat interno')" class="flex-1 glass-btn py-3 rounded-xl text-[10px] font-black uppercase tracking-widest text-white active:scale-95 transition-all">
                                    Ver Perfil
                                </button>
                                <button onclick="choosePro('${app.pro_phone}', '${app.pro_name}')" class="flex-1 bg-orange-500 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest text-black shadow-lg shadow-orange-500/20 active:scale-95 transition-all">
                                    Elegir Pro
                                </button>
                            </div>
                        </div>
                    `;
                });

            } catch (err) {
                container.innerHTML = `<p class="text-red-500 text-center text-[10px] font-black">Error al cargar postulantes</p>`;
            }
        }

        function choosePro(phone, name) {
            alert("Has elegido a " + name + ". En el siguiente paso activaremos el chat seguro.");
        }

        window.onload = loadPostulantes;
    </script>
</body>
</html>
